name: Package Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create zip archive
        run: |
          zip -r kindle-series-manager-${{ github.event.release.tag_name }}.zip . \
            -x '.git/*' '.github/*'

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: kindle-series-manager-${{ github.event.release.tag_name }}.zip
