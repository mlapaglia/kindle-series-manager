name: Package Release

on:
  pull_request:
  release:
    types: [created]

permissions:
  contents: write

env:
  FBINK_VERSION: v1.27.0
  FBINK_REPO: mlapaglia/FBInk
  FBINK_HASH: b6334723

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build ss_shield
        run: bash tools/ss_shield/build.sh

      - name: Download FBInk binaries
        run: |
          BIN_DIR=kual-extension/kindle-series-manager/bin
          BASE_URL="https://github.com/${{ env.FBINK_REPO }}/releases/download/${{ env.FBINK_VERSION }}"

          curl -fSL "$BASE_URL/FBInk-Kindle-HF-${{ env.FBINK_HASH }}.tar.gz" -o /tmp/fbink_hf.tar.gz
          tar -xzf /tmp/fbink_hf.tar.gz -C /tmp fbink
          mv /tmp/fbink "$BIN_DIR/fbink_hf"

          curl -fSL "$BASE_URL/FBInk-Kindle-${{ env.FBINK_HASH }}.tar.gz" -o /tmp/fbink_sf.tar.gz
          tar -xzf /tmp/fbink_sf.tar.gz -C /tmp fbink
          mv /tmp/fbink "$BIN_DIR/fbink_sf"

          curl -fSL "$BASE_URL/FBInk-Kindle5-${{ env.FBINK_HASH }}.tar.gz" -o /tmp/fbink_k5.tar.gz
          tar -xzf /tmp/fbink_k5.tar.gz -C /tmp fbink
          mv /tmp/fbink "$BIN_DIR/fbink_k5"

          rm -f /tmp/fbink_*.tar.gz
          chmod +x "$BIN_DIR"/fbink_*
          ls -la "$BIN_DIR"/fbink_*

      - name: Create zip archive
        run: |
          zip -r kindle-series-manager-${{ github.event.release.tag_name }}.zip . \
            -x '.git/*' '.github/*' '.venv/*' '.pytest_cache/*' \
            'tests/*' 'tools/*' 'Dockerfile.test' 'run_tests.sh' \
            'pyproject.toml' '__pycache__/*' '*.pyc'

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: kindle-series-manager-${{ github.event.release.tag_name }}.zip
