<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kindle Series Manager</title>
<script src="png-codec.js"></script>
<style>
* { box-sizing: border-box; }
:root {
  --bg: #f8f8f8;
  --fg: #1a1a1a;
  --fg-muted: #666;
  --fg-faint: #888;
  --fg-fainter: #aaa;
  --surface: #fff;
  --surface-alt: #fafafa;
  --border: #e0e0e0;
  --border-light: #e8e8e8;
  --border-row: #f0f0f0;
  --accent: #1a1a1a;
  --accent-hover: #333;
  --input-border: #d0d0d0;
  --input-border-hover: #bbb;
  --badge-bg: #f0f0f0;
  --danger: #c0392b;
  --danger-border: #e0c0bc;
  --danger-bg: #fdf2f0;
}
.dark {
  --bg: #1a1a1a;
  --fg: #e0e0e0;
  --fg-muted: #999;
  --fg-faint: #888;
  --fg-fainter: #666;
  --surface: #252525;
  --surface-alt: #2a2a2a;
  --border: #3a3a3a;
  --border-light: #333;
  --border-row: #303030;
  --accent: #e0e0e0;
  --accent-hover: #fff;
  --input-border: #444;
  --input-border-hover: #666;
  --badge-bg: #333;
  --danger: #e74c3c;
  --danger-border: #5a2a2a;
  --danger-bg: #3a2020;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--fg);
  margin: 0;
  padding: 0;
  font-size: 15px;
  line-height: 1.5;
}

.header {
  background: #1a1a1a;
  color: #fff;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.dark .header { background: #111; }
.header h1 {
  font-size: 18px;
  font-weight: 600;
  margin: 0;
  letter-spacing: -0.3px;
  flex: 1;
}
.header .logo {
  font-size: 22px;
  opacity: 0.7;
}
.theme-toggle {
  width: 44px;
  height: 24px;
  border-radius: 12px;
  background: #444;
  border: none;
  cursor: pointer;
  position: relative;
  padding: 0;
  transition: background 0.25s;
  flex-shrink: 0;
}
.theme-toggle::after {
  content: '';
  position: absolute;
  top: 3px;
  left: 3px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #fff;
  transition: transform 0.25s;
}
.dark .theme-toggle { background: #666; }
.dark .theme-toggle::after { transform: translateX(20px); }

.nav {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 12px;
}
.nav button {
  font-size: 14px;
  font-weight: 500;
  padding: 12px 16px;
  border: none;
  background: none;
  color: var(--fg-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
}
.nav button:hover { color: var(--fg); }
.nav button.active {
  color: var(--fg);
  border-bottom-color: var(--accent);
}

.container { max-width: 960px; margin: 0 auto; padding: 16px; }

#status {
  padding: 10px 14px;
  margin: 0 0 12px 0;
  font-size: 14px;
  color: var(--fg-muted);
  background: var(--surface);
  border-radius: 6px;
  border: 1px solid var(--border-light);
  display: none;
}
#status.visible { display: block; }

.card {
  background: var(--surface);
  border-radius: 8px;
  border: 1px solid var(--border);
  padding: 16px;
  margin-bottom: 12px;
}
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.card-title {
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.2px;
}
.card-subtitle {
  font-size: 13px;
  color: var(--fg-faint);
  font-weight: 400;
}

.book-item {
  padding: 6px 0;
  font-size: 14px;
  color: var(--fg-muted);
  border-bottom: 1px solid var(--border-row);
}
.book-item:last-child { border-bottom: none; }
.book-num {
  display: inline-block;
  width: 24px;
  height: 24px;
  line-height: 24px;
  text-align: center;
  background: var(--badge-bg);
  border-radius: 4px;
  font-size: 12px;
  font-weight: 600;
  color: var(--fg-muted);
  margin-right: 8px;
}

.btn {
  font-size: 14px;
  font-weight: 500;
  padding: 8px 16px;
  border: 1px solid var(--input-border);
  border-radius: 6px;
  background: var(--surface);
  color: var(--fg);
  cursor: pointer;
  transition: all 0.15s;
}
.btn:hover { background: var(--surface-alt); border-color: var(--input-border-hover); }
.btn:active { background: var(--badge-bg); }
.btn-primary {
  background: var(--accent);
  color: var(--bg);
  border-color: var(--accent);
}
.btn-primary:hover { background: var(--accent-hover); }
.btn-danger {
  color: var(--danger);
  border-color: var(--danger-border);
}
.btn-danger:hover { background: var(--danger-bg); border-color: var(--danger); }

.empty-state {
  text-align: center;
  padding: 32px 16px;
  color: var(--fg-fainter);
  font-size: 14px;
}

/* Create series panels */
.create-layout { display: flex; gap: 16px; }
.create-layout > div { flex: 1; min-width: 0; }

.panel-header {
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--fg-faint);
  margin-bottom: 8px;
}

.input-field {
  width: 100%;
  font-size: 15px;
  padding: 10px 12px;
  border: 1px solid var(--input-border);
  border-radius: 6px;
  margin-bottom: 12px;
  transition: border-color 0.15s;
  font-family: inherit;
  background: var(--surface);
  color: var(--fg);
}
.input-field:focus { outline: none; border-color: var(--accent); }
.input-field::placeholder { color: var(--fg-fainter); }
.input-small { font-size: 13px; padding: 8px 10px; margin-bottom: 8px; }

.selected-list {
  min-height: 80px;
  border: 2px dashed var(--input-border);
  border-radius: 8px;
  padding: 6px;
  background: var(--surface-alt);
  transition: border-color 0.15s;
}
.selected-list.has-items { border-style: solid; border-color: var(--border); background: var(--surface); }

.selected-book {
  display: flex;
  align-items: center;
  padding: 10px;
  margin: 4px 0;
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: 6px;
  cursor: grab;
  user-select: none;
  transition: box-shadow 0.15s, opacity 0.15s;
}
.selected-book:hover { box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.selected-book:active { cursor: grabbing; }
.selected-book .grip {
  color: var(--fg-fainter);
  margin-right: 8px;
  font-size: 16px;
  line-height: 1;
}
.selected-book .pos {
  font-weight: 700;
  font-size: 14px;
  width: 26px;
  height: 26px;
  line-height: 26px;
  text-align: center;
  margin-right: 10px;
  background: var(--accent);
  color: var(--bg);
  border-radius: 50%;
  flex-shrink: 0;
}
.selected-book .title { flex: 1; font-size: 14px; }
.selected-book .remove-btn {
  cursor: pointer;
  color: var(--fg-fainter);
  font-size: 18px;
  padding: 0 4px;
  line-height: 1;
  transition: color 0.15s;
}
.selected-book .remove-btn:hover { color: var(--danger); }
.selected-book.dragging { opacity: 0.3; }
.selected-book.drag-over { border-top: 2px solid var(--accent); margin-top: 2px; }

.avail-list {
  max-height: 420px;
  overflow-y: auto;
  border: 1px solid var(--border);
  border-radius: 6px;
}
.avail-book {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border-row);
  cursor: pointer;
  font-size: 14px;
  transition: background 0.1s;
}
.avail-book:last-child { border-bottom: none; }
.avail-book:hover { background: var(--surface-alt); }
.avail-book.added {
  opacity: 0.3;
  pointer-events: none;
  text-decoration: line-through;
}
</style>
</head>
<body>

<div class="header">
  <span class="logo">&#x1F4DA;</span>
  <h1>Kindle Series Manager</h1>
  <button class="theme-toggle" onclick="toggleDark()" title="Toggle dark mode"></button>
</div>

<div class="nav">
  <button id="btnList" onclick="loadSeries()">My Series</button>
  <button id="btnCreate" onclick="loadCreate()">Create Series</button>
  <button id="btnProgress" onclick="loadProgress()">Progress Tracking</button>
  <button id="btnScreensavers" onclick="loadScreensavers()">Screensavers</button>
</div>

<div class="container">
  <div id="status"></div>
  <div id="content"></div>
</div>

<script>
if (localStorage.getItem('dark') !== '0') document.documentElement.classList.add('dark');
function toggleDark() {
  var on = document.documentElement.classList.toggle('dark');
  localStorage.setItem('dark', on ? '1' : '0');
}

var selectedBooks = [];
var editingSeriesId = null;

function setStatus(msg) {
  var el = document.getElementById('status');
  if (msg) {
    el.textContent = msg;
    el.classList.add('visible');
  } else {
    el.textContent = '';
    el.classList.remove('visible');
  }
}

function setActive(id) {
  var btns = document.querySelectorAll('.nav button');
  for (var i = 0; i < btns.length; i++) btns[i].className = '';
  if (id) document.getElementById(id).className = 'active';
}

function loadSeries() {
  setActive('btnList');
  setStatus('Loading...');
  fetch('/cgi-bin/series.cgi')
    .then(function(r) { return r.text(); })
    .then(function(text) {
      document.getElementById('content').innerHTML = text;
      setStatus('');
    })
    .catch(function(e) { setStatus('Error: ' + e); });
}

function loadCreate() {
  setActive('btnCreate');
  setStatus('Loading books...');
  selectedBooks = [];
  editingSeriesId = null;
  fetch('/cgi-bin/books.cgi')
    .then(function(r) { return r.text(); })
    .then(function(text) {
      document.getElementById('content').innerHTML = text;
      setStatus('');
    })
    .catch(function(e) { setStatus('Error: ' + e); });
}

function editSeries(seriesId) {
  setActive('btnCreate');
  setStatus('Loading...');
  selectedBooks = [];
  editingSeriesId = seriesId;

  Promise.all([
    fetch('/cgi-bin/seriesdata.cgi?id=' + encodeURIComponent(seriesId)).then(function(r) { return r.json(); }),
    fetch('/cgi-bin/books.cgi').then(function(r) { return r.text(); })
  ]).then(function(results) {
    var data = results[0];
    var html = results[1];

    document.getElementById('content').innerHTML = html;
    document.getElementById('newSeriesName').value = data.name;
    document.getElementById('newSeriesAsin').value = data.asin || '';

    selectedBooks = data.books;
    renderSelected();

    var avail = document.querySelectorAll('.avail-book');
    for (var i = 0; i < avail.length; i++) {
      var key = avail[i].getAttribute('data-key');
      if (selectedBooks.some(function(b) { return b.key === key; })) {
        avail[i].classList.add('added');
      }
    }

    var badgeVal = data.badgeMode || 'none';
    var badgeRadio = document.querySelector('input[name="badgeMode"][value="' + badgeVal + '"]');
    if (badgeRadio) badgeRadio.checked = true;

    document.getElementById('btnSave').textContent = 'Update Series';
    setStatus('');
  }).catch(function(e) { setStatus('Error: ' + e); });
}

function addBook(el) {
  var key = el.getAttribute('data-key');
  var title = el.getAttribute('data-title');
  if (selectedBooks.some(function(b) { return b.key === key; })) return;
  selectedBooks.push({ key: key, title: title });
  el.classList.add('added');
  renderSelected();
}

function removeBook(index) {
  var removed = selectedBooks.splice(index, 1)[0];
  var avail = document.querySelectorAll('.avail-book');
  for (var i = 0; i < avail.length; i++) {
    if (avail[i].getAttribute('data-key') === removed.key) {
      avail[i].classList.remove('added');
    }
  }
  renderSelected();
}

function renderSelected() {
  var container = document.getElementById('selectedBooks');
  var countEl = document.getElementById('selectedCount');
  countEl.textContent = selectedBooks.length;

  if (selectedBooks.length === 0) {
    container.className = 'selected-list';
    container.innerHTML = '<div class="empty-state">Click books from the right to add them</div>';
  } else {
    container.className = 'selected-list has-items';
    var html = '';
    for (var i = 0; i < selectedBooks.length; i++) {
      html += '<div class="selected-book" draggable="true" data-idx="' + i + '">'
        + '<span class="grip">&#x2630;</span>'
        + '<span class="pos">' + (i + 1) + '</span>'
        + '<span class="title">' + selectedBooks[i].title + '</span>'
        + '<span class="remove-btn" onclick="removeBook(' + i + ')">&times;</span>'
        + '</div>';
    }
    container.innerHTML = html;
  }
  setupDrag();
}

var dragSrcIdx = null;

function setupDrag() {
  var items = document.querySelectorAll('.selected-book');
  for (var i = 0; i < items.length; i++) {
    items[i].addEventListener('dragstart', function(e) {
      dragSrcIdx = parseInt(this.getAttribute('data-idx'));
      this.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', dragSrcIdx);
    });
    items[i].addEventListener('dragend', function(e) {
      this.classList.remove('dragging');
      var all = document.querySelectorAll('.selected-book');
      for (var j = 0; j < all.length; j++) all[j].classList.remove('drag-over');
    });
    items[i].addEventListener('dragover', function(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      var all = document.querySelectorAll('.selected-book');
      for (var j = 0; j < all.length; j++) all[j].classList.remove('drag-over');
      this.classList.add('drag-over');
    });
    items[i].addEventListener('drop', function(e) {
      e.preventDefault();
      var targetIdx = parseInt(this.getAttribute('data-idx'));
      if (dragSrcIdx === null || dragSrcIdx === targetIdx) return;
      var moved = selectedBooks.splice(dragSrcIdx, 1)[0];
      selectedBooks.splice(targetIdx, 0, moved);
      renderSelected();
    });
  }
}

function filterBooks() {
  var q = document.getElementById('bookFilter').value.toLowerCase();
  var items = document.querySelectorAll('.avail-book');
  for (var i = 0; i < items.length; i++) {
    var title = items[i].getAttribute('data-title').toLowerCase();
    items[i].style.display = title.indexOf(q) >= 0 ? '' : 'none';
  }
}

function saveSeries() {
  var name = document.getElementById('newSeriesName').value.trim();
  if (!name) { setStatus('Enter a series name'); return; }
  if (selectedBooks.length < 2) { setStatus('Select at least 2 books'); return; }

  var asin = document.getElementById('newSeriesAsin').value.trim();
  var books = [];
  for (var i = 0; i < selectedBooks.length; i++) {
    books.push(selectedBooks[i].key + ':' + (i + 1));
  }

  var badgeMode = 'none';
  var badgeRadios = document.getElementsByName('badgeMode');
  for (var j = 0; j < badgeRadios.length; j++) {
    if (badgeRadios[j].checked) { badgeMode = badgeRadios[j].value; break; }
  }

  var isEdit = !!editingSeriesId;
  setStatus(isEdit ? 'Updating series...' : 'Creating series...');
  var body = 'name=' + encodeURIComponent(name)
    + '&asin=' + encodeURIComponent(asin)
    + '&badge_mode=' + encodeURIComponent(badgeMode)
    + '&books=' + encodeURIComponent(books.join(','));

  if (isEdit) {
    body += '&edit_id=' + encodeURIComponent(editingSeriesId);
  }

  fetch('/cgi-bin/create.cgi', {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: body
  })
    .then(function(r) { return r.text(); })
    .then(function(text) {
      editingSeriesId = null;
      setStatus(text);
      loadSeries();
    })
    .catch(function(e) { setStatus('Error: ' + e); });
}

function removeSeries(seriesId) {
  if (!confirm('Remove this series? Books will return to the library.')) return;
  setStatus('Removing...');
  fetch('/cgi-bin/remove.cgi?id=' + encodeURIComponent(seriesId))
    .then(function(r) { return r.text(); })
    .then(function(text) {
      setStatus(text);
      loadSeries();
    })
    .catch(function(e) { setStatus('Error: ' + e); });
}

function loadProgress() {
  setActive('btnProgress');
  setStatus('Loading...');
  fetch('/cgi-bin/grpage.cgi')
    .then(function(r) { return r.text(); })
    .then(function(text) {
      document.getElementById('content').innerHTML = text;
      setStatus('');
    })
    .catch(function(e) { setStatus('Error: ' + e); });
}

function grSaveCreds() {
  var email = document.getElementById('grEmail').value.trim();
  var password = document.getElementById('grPassword').value;
  var userId = document.getElementById('grUserId').value.trim();
  var statusEl = document.getElementById('credsStatus');

  if (!email || !password || !userId) {
    statusEl.textContent = 'All fields are required';
    return;
  }

  statusEl.textContent = 'Saving...';
  fetch('/cgi-bin/gr_savecreds.cgi', {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: 'email=' + encodeURIComponent(email)
      + '&password=' + encodeURIComponent(password)
      + '&user_id=' + encodeURIComponent(userId)
  })
    .then(function(r) { return r.text(); })
    .then(function(text) { statusEl.textContent = text; })
    .catch(function(e) { statusEl.textContent = 'Error: ' + e; });
}

function grLogout() {
  fetch('/cgi-bin/gr_logout.cgi', { method: 'POST' })
    .then(function(r) { return r.text(); })
    .then(function() { loadProgress(); })
    .catch(function(e) { setStatus('Error: ' + e); });
}

function grLogin() {
  var el = document.getElementById('loginOutput');
  el.style.display = 'block';
  el.textContent = 'Signing in...';

  fetch('/cgi-bin/gr_dologin.cgi', {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: ''
  })
    .then(function(r) { return r.text(); })
    .then(function(text) {
      el.textContent = text;
    })
    .catch(function(e) { el.textContent = 'Error: ' + e; });
}

function grBuildMapping() {
  var el = document.getElementById('mappingOutput');
  el.style.display = 'block';
  el.textContent = 'Building mapping...';

  fetch('/cgi-bin/gr_domapping.cgi', {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: ''
  })
    .then(function(r) { return r.text(); })
    .then(function(text) {
      el.textContent = text;
      loadProgress();
    })
    .catch(function(e) { el.textContent = 'Error: ' + e; });
}

function grRefreshStatus() {
  loadProgress();
}

function loadScreensavers() {
  setActive('btnScreensavers');
  setStatus('Loading...');
  fetch('/cgi-bin/sspage.cgi')
    .then(function(r) { return r.text(); })
    .then(function(text) {
      document.getElementById('content').innerHTML = text;
      setStatus('');
      ssSetupDropZone();
    })
    .catch(function(e) { setStatus('Error: ' + e); });
}

function ssModelChanged(sel) {
  var parts = sel.value.split('x');
  var zone = document.getElementById('ssDropZone');
  if (zone) {
    zone.setAttribute('data-width', parts[0]);
    zone.setAttribute('data-height', parts[1]);
  }
}

function ssSetupDropZone() {
  var zone = document.getElementById('ssDropZone');
  var fileInput = document.getElementById('ssFileInput');
  if (!zone || !fileInput) return;

  zone.addEventListener('click', function() { fileInput.click(); });
  zone.addEventListener('dragover', function(e) {
    e.preventDefault();
    zone.style.borderColor = 'var(--accent)';
  });
  zone.addEventListener('dragleave', function() {
    zone.style.borderColor = 'var(--input-border)';
  });
  zone.addEventListener('drop', function(e) {
    e.preventDefault();
    zone.style.borderColor = 'var(--input-border)';
    if (e.dataTransfer.files.length > 0) ssProcessFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', function() {
    if (fileInput.files.length > 0) ssProcessFile(fileInput.files[0]);
  });
}

var _ssEditor = null;

function ssProcessFile(file) {
  var statusEl = document.getElementById('ssUploadStatus');
  var previewEl = document.getElementById('ssPreview');
  var zone = document.getElementById('ssDropZone');
  var targetW = parseInt(zone.getAttribute('data-width'));
  var targetH = parseInt(zone.getAttribute('data-height'));

  if (targetW === 0 || targetH === 0) {
    statusEl.textContent = 'Select your device model first.';
    return;
  }

  statusEl.textContent = 'Loading image...';

  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var fitScale = Math.max(targetW / img.width, targetH / img.height);
      _ssEditor = {
        img: img, targetW: targetW, targetH: targetH,
        zoom: 1, panX: 0, panY: 0, fitScale: fitScale,
        dragging: false, dragStartX: 0, dragStartY: 0, dragPanX: 0, dragPanY: 0
      };

      var editorSize = 300;
      var displayScale = editorSize / Math.max(targetW, targetH);
      var cw = Math.round(targetW * displayScale);
      var ch = Math.round(targetH * displayScale);

      previewEl.style.display = 'block';
      previewEl.innerHTML =
        '<div style="font-size:13px;color:var(--fg-muted);margin-bottom:8px;">Adjust crop (' + targetW + 'x' + targetH + ')</div>'
        + '<canvas id="ssEditorCanvas" width="' + cw + '" height="' + ch + '" style="border:1px solid var(--border);border-radius:4px;cursor:grab;display:block;"></canvas>'
        + '<div style="display:flex;align-items:center;gap:8px;margin-top:8px;">'
        + '<span style="font-size:12px;color:var(--fg-muted);">Zoom</span>'
        + '<input id="ssZoomSlider" type="range" min="100" max="500" value="100" style="flex:1;" oninput="ssEditorZoom(this.value)">'
        + '<span id="ssZoomLabel" style="font-size:12px;color:var(--fg-muted);min-width:36px;">100%</span>'
        + '</div>'
        + '<div style="display:flex;gap:8px;margin-top:8px;">'
        + '<button class="btn" style="font-size:12px;padding:4px 12px;" onclick="ssEditorCenter()">Center</button>'
        + '<button class="btn" style="font-size:12px;padding:4px 12px;" onclick="ssEditorReset()">Reset</button>'
        + '<button class="btn btn-primary" style="font-size:12px;padding:4px 12px;margin-left:auto;" onclick="ssEditorConfirm()">Upload Screensaver</button>'
        + '</div>';

      var c = document.getElementById('ssEditorCanvas');
      c.addEventListener('mousedown', ssEditorMouseDown);
      c.addEventListener('mousemove', ssEditorMouseMove);
      c.addEventListener('mouseup', ssEditorMouseUp);
      c.addEventListener('mouseleave', ssEditorMouseUp);
      c.addEventListener('touchstart', ssEditorTouchStart, {passive: false});
      c.addEventListener('touchmove', ssEditorTouchMove, {passive: false});
      c.addEventListener('touchend', ssEditorMouseUp);

      ssEditorDraw();
      statusEl.textContent = 'Drag to pan, use slider to zoom.';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function ssEditorDraw() {
  if (!_ssEditor) return;
  var e = _ssEditor;
  var c = document.getElementById('ssEditorCanvas');
  if (!c) return;
  var ctx = c.getContext('2d');
  var dw = c.width, dh = c.height;

  ctx.fillStyle = '#808080';
  ctx.fillRect(0, 0, dw, dh);

  var displayScale = dw / e.targetW;
  var s = e.fitScale * e.zoom;
  var iw = e.img.width * s * displayScale;
  var ih = e.img.height * s * displayScale;
  var ix = (dw - iw) / 2 + e.panX * displayScale;
  var iy = (dh - ih) / 2 + e.panY * displayScale;

  ctx.drawImage(e.img, ix, iy, iw, ih);

  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1;
  for (var i = 1; i < 3; i++) {
    ctx.beginPath();
    ctx.moveTo(dw * i / 3, 0);
    ctx.lineTo(dw * i / 3, dh);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, dh * i / 3);
    ctx.lineTo(dw, dh * i / 3);
    ctx.stroke();
  }
}

function ssEditorZoom(val) {
  if (!_ssEditor) return;
  _ssEditor.zoom = parseInt(val) / 100;
  document.getElementById('ssZoomLabel').textContent = val + '%';
  ssEditorDraw();
}

function ssEditorCenter() {
  if (!_ssEditor) return;
  _ssEditor.panX = 0;
  _ssEditor.panY = 0;
  ssEditorDraw();
}

function ssEditorReset() {
  if (!_ssEditor) return;
  _ssEditor.zoom = 1;
  _ssEditor.panX = 0;
  _ssEditor.panY = 0;
  document.getElementById('ssZoomSlider').value = 100;
  document.getElementById('ssZoomLabel').textContent = '100%';
  ssEditorDraw();
}

function ssEditorMouseDown(ev) {
  if (!_ssEditor) return;
  _ssEditor.dragging = true;
  _ssEditor.dragStartX = ev.clientX;
  _ssEditor.dragStartY = ev.clientY;
  _ssEditor.dragPanX = _ssEditor.panX;
  _ssEditor.dragPanY = _ssEditor.panY;
  ev.target.style.cursor = 'grabbing';
}

function ssEditorMouseMove(ev) {
  if (!_ssEditor || !_ssEditor.dragging) return;
  var c = document.getElementById('ssEditorCanvas');
  var displayScale = c.width / _ssEditor.targetW;
  _ssEditor.panX = _ssEditor.dragPanX + (ev.clientX - _ssEditor.dragStartX) / displayScale;
  _ssEditor.panY = _ssEditor.dragPanY + (ev.clientY - _ssEditor.dragStartY) / displayScale;
  ssEditorDraw();
}

function ssEditorMouseUp(ev) {
  if (!_ssEditor) return;
  _ssEditor.dragging = false;
  if (ev.target) ev.target.style.cursor = 'grab';
}

function ssEditorTouchStart(ev) {
  if (!_ssEditor || ev.touches.length !== 1) return;
  ev.preventDefault();
  var t = ev.touches[0];
  _ssEditor.dragging = true;
  _ssEditor.dragStartX = t.clientX;
  _ssEditor.dragStartY = t.clientY;
  _ssEditor.dragPanX = _ssEditor.panX;
  _ssEditor.dragPanY = _ssEditor.panY;
}

function ssEditorTouchMove(ev) {
  if (!_ssEditor || !_ssEditor.dragging || ev.touches.length !== 1) return;
  ev.preventDefault();
  var t = ev.touches[0];
  var c = document.getElementById('ssEditorCanvas');
  var displayScale = c.width / _ssEditor.targetW;
  _ssEditor.panX = _ssEditor.dragPanX + (t.clientX - _ssEditor.dragStartX) / displayScale;
  _ssEditor.panY = _ssEditor.dragPanY + (t.clientY - _ssEditor.dragStartY) / displayScale;
  ssEditorDraw();
}

function ssEditorConfirm() {
  if (!_ssEditor) return;
  var e = _ssEditor;
  var statusEl = document.getElementById('ssUploadStatus');
  statusEl.textContent = 'Processing...';

  var canvas = document.createElement('canvas');
  canvas.width = e.targetW;
  canvas.height = e.targetH;
  var ctx = canvas.getContext('2d');

  ctx.fillStyle = '#808080';
  ctx.fillRect(0, 0, e.targetW, e.targetH);

  var s = e.fitScale * e.zoom;
  var iw = e.img.width * s;
  var ih = e.img.height * s;
  var ix = (e.targetW - iw) / 2 + e.panX;
  var iy = (e.targetH - ih) / 2 + e.panY;
  ctx.drawImage(e.img, ix, iy, iw, ih);

  var imageData = ctx.getImageData(0, 0, e.targetW, e.targetH);
  var d = imageData.data;
  for (var i = 0; i < d.length; i += 4) {
    var gray = Math.round(d[i] * 0.299 + d[i+1] * 0.587 + d[i+2] * 0.114);
    d[i] = gray; d[i+1] = gray; d[i+2] = gray; d[i+3] = 255;
  }

  statusEl.textContent = 'Encoding 8-bit grayscale PNG...';
  PngCodec.encodePng({ data: imageData.data, width: e.targetW, height: e.targetH }, {
    colorType: 0,
    bitDepth: 8
  }).then(function(result) {
    var bin = '';
    var bytes = result.data;
    for (var i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
    window._ssUploadData = btoa(bin);
    statusEl.textContent = 'Encoded (' + Math.round(bytes.length / 1024) + 'KB). Uploading...';
    ssUpload();
  }).catch(function(err) {
    statusEl.textContent = 'Encode error: ' + err;
  });
}

function ssUpload() {
  if (!window._ssUploadData) return;
  var statusEl = document.getElementById('ssUploadStatus');
  statusEl.textContent = 'Uploading...';

  fetch('/cgi-bin/ss_upload.cgi', {
    method: 'POST',
    headers: {'Content-Type': 'text/plain'},
    body: window._ssUploadData
  })
    .then(function(r) { return r.text(); })
    .then(function(text) {
      statusEl.textContent = text;
      window._ssUploadData = null;
      loadScreensavers();
    })
    .catch(function(e) { statusEl.textContent = 'Error: ' + e; });
}

function ssDisable(name) {
  setStatus('Disabling...');
  fetch('/cgi-bin/ss_disable.cgi', {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: 'name=' + encodeURIComponent(name)
  })
    .then(function(r) { return r.text(); })
    .then(function(text) { setStatus(text); loadScreensavers(); })
    .catch(function(e) { setStatus('Error: ' + e); });
}

function ssEnable(name) {
  setStatus('Enabling...');
  fetch('/cgi-bin/ss_enable.cgi', {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: 'name=' + encodeURIComponent(name)
  })
    .then(function(r) { return r.text(); })
    .then(function(text) { setStatus(text); loadScreensavers(); })
    .catch(function(e) { setStatus('Error: ' + e); });
}

function ssDelete(src, name) {
  if (!confirm('Permanently delete ' + name + '?')) return;
  setStatus('Deleting...');
  fetch('/cgi-bin/ss_delete.cgi', {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: 'src=' + encodeURIComponent(src) + '&name=' + encodeURIComponent(name)
  })
    .then(function(r) { return r.text(); })
    .then(function(text) { setStatus(text); loadScreensavers(); })
    .catch(function(e) { setStatus('Error: ' + e); });
}

loadSeries();
</script>
</body>
