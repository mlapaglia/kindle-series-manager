<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kindle Series Manager</title>
<script src="png-codec.js"></script>
<script src="collections.js"></script>
<style>
* { box-sizing: border-box; }
:root {
  --bg: #f8f8f8;
  --fg: #1a1a1a;
  --fg-muted: #666;
  --fg-faint: #888;
  --fg-fainter: #aaa;
  --surface: #fff;
  --surface-alt: #fafafa;
  --border: #e0e0e0;
  --border-light: #e8e8e8;
  --border-row: #f0f0f0;
  --accent: #1a1a1a;
  --accent-hover: #333;
  --input-border: #d0d0d0;
  --input-border-hover: #bbb;
  --badge-bg: #f0f0f0;
  --danger: #c0392b;
  --danger-border: #e0c0bc;
  --danger-bg: #fdf2f0;
}
.dark {
  --bg: #1a1a1a;
  --fg: #e0e0e0;
  --fg-muted: #999;
  --fg-faint: #888;
  --fg-fainter: #666;
  --surface: #252525;
  --surface-alt: #2a2a2a;
  --border: #3a3a3a;
  --border-light: #333;
  --border-row: #303030;
  --accent: #e0e0e0;
  --accent-hover: #fff;
  --input-border: #444;
  --input-border-hover: #666;
  --badge-bg: #333;
  --danger: #e74c3c;
  --danger-border: #5a2a2a;
  --danger-bg: #3a2020;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--fg);
  margin: 0;
  padding: 0;
  font-size: 15px;
  line-height: 1.5;
}

.header {
  background: #1a1a1a;
  color: #fff;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.dark .header { background: #111; }
.header h1 {
  font-size: 18px;
  font-weight: 600;
  margin: 0;
  letter-spacing: -0.3px;
  flex: 1;
}
.header .logo {
  font-size: 22px;
  opacity: 0.7;
}
.theme-toggle {
  width: 44px;
  height: 24px;
  border-radius: 12px;
  background: #444;
  border: none;
  cursor: pointer;
  position: relative;
  padding: 0;
  transition: background 0.25s;
  flex-shrink: 0;
}
.theme-toggle::after {
  content: '';
  position: absolute;
  top: 3px;
  left: 3px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #fff;
  transition: transform 0.25s;
}
.dark .theme-toggle { background: #666; }
.dark .theme-toggle::after { transform: translateX(20px); }

.nav {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 12px;
}
.nav button {
  font-size: 14px;
  font-weight: 500;
  padding: 12px 16px;
  border: none;
  background: none;
  color: var(--fg-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
}
.nav button:hover { color: var(--fg); }
.nav button.active {
  color: var(--fg);
  border-bottom-color: var(--accent);
}

.container { max-width: 960px; margin: 0 auto; padding: 16px; }

#status {
  padding: 10px 14px;
  margin: 0 0 12px 0;
  font-size: 14px;
  color: var(--fg-muted);
  background: var(--surface);
  border-radius: 6px;
  border: 1px solid var(--border-light);
  display: none;
}
#status.visible { display: block; }

.card {
  background: var(--surface);
  border-radius: 8px;
  border: 1px solid var(--border);
  padding: 16px;
  margin-bottom: 12px;
}
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.card-header:only-child { margin-bottom: 0; }
.card.expanded .card-header { margin-bottom: 8px; }
.card-title {
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.2px;
}
.card-subtitle {
  font-size: 13px;
  color: var(--fg-faint);
  font-weight: 400;
}

.card-body-inner {
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
.series-thumb {
  width: 64px;
  flex-shrink: 0;
  border-radius: 4px;
  border: 1px solid var(--border);
}
.series-books { flex: 1; min-width: 0; }

.book-item {
  padding: 6px 0;
  font-size: 14px;
  color: var(--fg-muted);
  border-bottom: 1px solid var(--border-row);
}
.book-item:last-child { border-bottom: none; }
.book-num {
  display: inline-block;
  width: 24px;
  height: 24px;
  line-height: 24px;
  text-align: center;
  background: var(--badge-bg);
  border-radius: 4px;
  font-size: 12px;
  font-weight: 600;
  color: var(--fg-muted);
  margin-right: 8px;
}

.btn {
  font-size: 14px;
  font-weight: 500;
  padding: 8px 16px;
  border: 1px solid var(--input-border);
  border-radius: 6px;
  background: var(--surface);
  color: var(--fg);
  cursor: pointer;
  transition: all 0.15s;
}
.btn:hover { background: var(--surface-alt); border-color: var(--input-border-hover); }
.btn:active { background: var(--badge-bg); }
.btn-primary {
  background: var(--accent);
  color: var(--bg);
  border-color: var(--accent);
}
.btn-primary:hover { background: var(--accent-hover); }
.btn-danger {
  color: var(--danger);
  border-color: var(--danger-border);
}
.btn-danger:hover { background: var(--danger-bg); border-color: var(--danger); }

.empty-state {
  text-align: center;
  padding: 32px 16px;
  color: var(--fg-fainter);
  font-size: 14px;
}

/* Create series panels */
.create-layout { display: flex; gap: 16px; }
.create-layout > div { flex: 1; min-width: 0; }

.panel-header {
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--fg-faint);
  margin-bottom: 8px;
}

.input-field {
  width: 100%;
  font-size: 15px;
  padding: 10px 12px;
  border: 1px solid var(--input-border);
  border-radius: 6px;
  margin-bottom: 12px;
  transition: border-color 0.15s;
  font-family: inherit;
  background: var(--surface);
  color: var(--fg);
}
.input-field:focus { outline: none; border-color: var(--accent); }
.input-field::placeholder { color: var(--fg-fainter); }
.input-small { font-size: 13px; padding: 8px 10px; margin-bottom: 8px; }

.selected-list {
  min-height: 80px;
  border: 2px dashed var(--input-border);
  border-radius: 8px;
  padding: 6px;
  background: var(--surface-alt);
  transition: border-color 0.15s;
}
.selected-list.has-items { border-style: solid; border-color: var(--border); background: var(--surface); }

.selected-book {
  display: flex;
  align-items: center;
  padding: 10px;
  margin: 4px 0;
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: 6px;
  cursor: grab;
  user-select: none;
  transition: box-shadow 0.15s, opacity 0.15s;
}
.selected-book:hover { box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.selected-book:active { cursor: grabbing; }
.selected-book .grip {
  color: var(--fg-fainter);
  margin-right: 8px;
  font-size: 16px;
  line-height: 1;
}
.selected-book .pos {
  font-weight: 700;
  font-size: 14px;
  width: 26px;
  height: 26px;
  line-height: 26px;
  text-align: center;
  margin-right: 10px;
  background: var(--accent);
  color: var(--bg);
  border-radius: 50%;
  flex-shrink: 0;
}
.selected-book .title { flex: 1; font-size: 14px; }
.selected-book .remove-btn {
  cursor: pointer;
  color: var(--fg-fainter);
  font-size: 18px;
  padding: 0 4px;
  line-height: 1;
  transition: color 0.15s;
}
.selected-book .remove-btn:hover { color: var(--danger); }
.selected-book.dragging { opacity: 0.3; }
.selected-book.drag-over { border-top: 2px solid var(--accent); margin-top: 2px; }

.avail-list {
  max-height: 420px;
  overflow-y: auto;
  border: 1px solid var(--border);
  border-radius: 6px;
}
.avail-book {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border-row);
  cursor: pointer;
  font-size: 14px;
  transition: background 0.1s;
}
.avail-book:last-child { border-bottom: none; }
.avail-book:hover { background: var(--surface-alt); }
.avail-book.added {
  opacity: 0.3;
  pointer-events: none;
  text-decoration: line-through;
}
.avail-author-label {
  display: block;
  font-size: 11px;
  color: var(--fg-muted);
  line-height: 1.3;
}
.avail-series-label {
  display: block;
  font-size: 11px;
  color: var(--fg-fainter);
  line-height: 1.3;
}

.upload-drop-zone {
  border: 2px dashed var(--input-border);
  border-radius: 8px;
  padding: 32px 16px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  color: var(--fg-muted);
  font-size: 14px;
}
.upload-drop-zone:hover { border-color: var(--accent); }
.upload-drop-zone.drag-active {
  border-color: var(--accent);
  background: var(--surface-alt);
}
.upload-file-item {
  display: flex;
  align-items: center;
  padding: 8px 10px;
  border-bottom: 1px solid var(--border-row);
  font-size: 14px;
  gap: 8px;
}
.upload-file-item:last-child { border-bottom: none; }
.upload-file-item.uploading { background: var(--surface-alt); }
.upload-file-status { flex-shrink: 0; width: 20px; text-align: center; font-size: 14px; }
.upload-file-name {
  flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.upload-file-size { flex-shrink: 0; font-size: 12px; color: var(--fg-faint); }
.upload-file-error {
  flex-shrink: 0; font-size: 12px; color: var(--danger);
  max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.upload-file-remove {
  cursor: pointer; color: var(--fg-fainter);
  font-size: 18px; padding: 0 4px; line-height: 1;
  transition: color 0.15s;
}
.upload-file-remove:hover { color: var(--danger); }

.cal-book {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px;
  border-bottom: 1px solid var(--border-row);
}
.cal-book:last-child { border-bottom: none; }
.cal-book-thumb {
  width: 48px;
  height: 64px;
  object-fit: cover;
  border-radius: 4px;
  border: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--badge-bg);
}
.cal-book-info { flex: 1; min-width: 0; }
.cal-book-title {
  font-size: 14px;
  font-weight: 500;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.cal-book-meta {
  font-size: 12px;
  color: var(--fg-faint);
  margin-top: 2px;
}
.cal-book-actions { flex-shrink: 0; display: flex; align-items: center; gap: 8px; }
.cal-check { width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent); }
.cal-pagination {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  font-size: 13px;
  color: var(--fg-muted);
}
.cal-pagination-btns { display: flex; gap: 6px; }

/* OPDS Browser */
.opds-breadcrumb {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  font-size: 13px;
  color: var(--fg-muted);
  margin-bottom: 12px;
}
.opds-breadcrumb a {
  color: var(--accent);
  cursor: pointer;
  text-decoration: none;
}
.opds-breadcrumb a:hover { text-decoration: underline; }
.opds-breadcrumb .sep { margin: 0 2px; }

.opds-entry {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px;
  border-bottom: 1px solid var(--border-row);
  cursor: pointer;
}
.opds-entry:last-child { border-bottom: none; }
.opds-entry:hover { background: var(--surface-alt); }
.opds-entry-nav { cursor: pointer; }
.opds-entry-nav .opds-entry-icon {
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
  background: var(--badge-bg);
  border-radius: 6px;
}
.opds-entry-thumb {
  width: 48px;
  height: 64px;
  object-fit: cover;
  border-radius: 4px;
  border: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--badge-bg);
}
.opds-entry-info { flex: 1; min-width: 0; }
.opds-entry-title {
  font-size: 14px;
  font-weight: 500;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.opds-entry-meta {
  font-size: 12px;
  color: var(--fg-faint);
  margin-top: 2px;
}
.opds-entry-summary {
  font-size: 12px;
  color: var(--fg-muted);
  margin-top: 4px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.opds-entry-actions {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 6px;
}
.opds-format-badge {
  display: inline-block;
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 3px;
  background: var(--badge-bg);
  color: var(--fg-muted);
  text-transform: uppercase;
}
.opds-pagination {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  font-size: 13px;
  color: var(--fg-muted);
}
.opds-pagination-btns { display: flex; gap: 6px; }
.opds-source-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  border-bottom: 1px solid var(--border-row);
}
.opds-source-row:last-child { border-bottom: none; }
.opds-source-name { flex: 1; font-size: 14px; }
.opds-source-url { font-size: 12px; color: var(--fg-faint); flex: 2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* Nav overflow for many tabs */
.nav { overflow-x: auto; -webkit-overflow-scrolling: touch; flex-wrap: wrap; }

/* Responsive */
@media (max-width: 600px) {
  .create-layout { flex-direction: column; }
  .avail-list { max-height: 260px; }
  .container { padding: 10px; }
  .nav button { padding: 10px 12px; font-size: 13px; }
  .card { padding: 12px; }
  .cal-book { gap: 8px; padding: 8px; }
  .cal-book-thumb { width: 40px; height: 53px; }
}
</style>
</head>
<body>

<div class="header">
  <span class="logo">&#x1F4DA;</span>
  <h1>Kindle Series Manager</h1>
  <button class="theme-toggle" onclick="toggleDark()" title="Toggle dark mode"></button>
</div>

<div class="nav" id="navBar" role="tablist"></div>

<div class="container">
  <div id="status" role="status" aria-live="polite"></div>
  <div id="content"></div>
</div>

<script>
if (localStorage.getItem('dark') !== '0') document.documentElement.classList.add('dark');
function toggleDark() {
  var on = document.documentElement.classList.toggle('dark');
  localStorage.setItem('dark', on ? '1' : '0');
}

var selectedBooks = [];
var editingSeriesId = null;

function setStatus(msg) {
  var el = document.getElementById('status');
  if (msg) {
    el.textContent = msg;
    el.classList.add('visible');
  } else {
    el.textContent = '';
    el.classList.remove('visible');
  }
}

function setActive(id) {
  var btns = document.querySelectorAll('.nav button');
  for (var i = 0; i < btns.length; i++) btns[i].className = '';
  var el = document.getElementById('btn_' + id);
  if (el) el.className = 'active';
}

function debounce(fn, ms) {
  var timer;
  return function() {
    var ctx = this, args = arguments;
    clearTimeout(timer);
    timer = setTimeout(function() { fn.apply(ctx, args); }, ms);
  };
}

function loadSeries() {
  setActive('series');
  setStatus('Loading...');
  fetch('/cgi-bin/series.cgi')
    .then(function(r) { return r.text(); })
    .then(function(text) {
      document.getElementById('content').innerHTML = text;
      setStatus('');
    })
    .catch(function(e) { setStatus('Error: ' + e); });
}

function toggleCard(btn) {
  var card = btn.closest('.card');
  var body = card.querySelector('.card-body');
  var expanded = body.style.display !== 'none';
  body.style.display = expanded ? 'none' : '';
  btn.textContent = expanded ? 'Show' : 'Hide';
  card.classList.toggle('expanded', !expanded);
}

function loadCreate() {
  setActive('create');
  setStatus('Loading books...');
  selectedBooks = [];
  editingSeriesId = null;
  fetch('/cgi-bin/books.cgi')
    .then(function(r) { return r.text(); })
    .then(function(text) {
      document.getElementById('content').innerHTML = text;
      setStatus('');
    })
    .catch(function(e) { setStatus('Error: ' + e); });
}

function editSeries(seriesId) {
  setActive('create');
  setStatus('Loading...');
  selectedBooks = [];
  editingSeriesId = seriesId;

  Promise.all([
    fetch('/cgi-bin/seriesdata.cgi?id=' + encodeURIComponent(seriesId)).then(function(r) { return r.json(); }),
    fetch('/cgi-bin/books.cgi').then(function(r) { return r.text(); })
  ]).then(function(results) {
    var data = results[0];
    var html = results[1];

    document.getElementById('content').innerHTML = html;
    document.getElementById('newSeriesName').value = data.name;
    document.getElementById('newSeriesAsin').value = data.asin || '';

    selectedBooks = data.books;
    renderSelected();

    var avail = document.querySelectorAll('.avail-book');
    for (var i = 0; i < avail.length; i++) {
      var key = avail[i].getAttribute('data-key');
      if (selectedBooks.some(function(b) { return b.key === key; })) {
        avail[i].classList.add('added');
      }
    }

    var badgeVal = data.badgeMode || 'none';
    var badgeRadio = document.querySelector('input[name="badgeMode"][value="' + badgeVal + '"]');
    if (badgeRadio) badgeRadio.checked = true;

    document.getElementById('btnSave').textContent = 'Update Series';
    setStatus('');
  }).catch(function(e) { setStatus('Error: ' + e); });
}

function addBook(el) {
  var key = el.getAttribute('data-key');
  var title = el.getAttribute('data-title');
  if (selectedBooks.some(function(b) { return b.key === key; })) return;
  selectedBooks.push({ key: key, title: title });
  el.classList.add('added');
  renderSelected();
}

function removeBook(index) {
  var removed = selectedBooks.splice(index, 1)[0];
  var avail = document.querySelectorAll('.avail-book');
  for (var i = 0; i < avail.length; i++) {
    if (avail[i].getAttribute('data-key') === removed.key) {
      avail[i].classList.remove('added');
    }
  }
  renderSelected();
}

function renderSelected() {
  var container = document.getElementById('selectedBooks');
  var countEl = document.getElementById('selectedCount');
  countEl.textContent = selectedBooks.length;

  if (selectedBooks.length === 0) {
    container.className = 'selected-list';
    container.innerHTML = '<div class="empty-state">Click books from the right to add them</div>';
  } else {
    container.className = 'selected-list has-items';
    var html = '';
    for (var i = 0; i < selectedBooks.length; i++) {
      html += '<div class="selected-book" draggable="true" data-idx="' + i + '">'
        + '<span class="grip">&#x2630;</span>'
        + '<span class="pos">' + (i + 1) + '</span>'
        + '<span class="title">' + escapeHtml(selectedBooks[i].title) + '</span>'
        + '<span class="remove-btn" data-remove-idx="' + i + '">&times;</span>'
        + '</div>';
    }
    container.innerHTML = html;
  }
  setupDrag();
}

var dragSrcIdx = null;

function setupDrag() {
  var container = document.getElementById('selectedBooks');
  if (!container || container._dragDelegated) return;
  container._dragDelegated = true;

  container.addEventListener('dragstart', function(e) {
    var item = e.target.closest('.selected-book');
    if (!item) return;
    dragSrcIdx = parseInt(item.getAttribute('data-idx'));
    item.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', dragSrcIdx);
  });
  container.addEventListener('dragend', function(e) {
    var item = e.target.closest('.selected-book');
    if (item) item.classList.remove('dragging');
    var all = container.querySelectorAll('.selected-book');
    for (var j = 0; j < all.length; j++) all[j].classList.remove('drag-over');
  });
  container.addEventListener('dragover', function(e) {
    var item = e.target.closest('.selected-book');
    if (!item) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    var all = container.querySelectorAll('.selected-book');
    for (var j = 0; j < all.length; j++) all[j].classList.remove('drag-over');
    item.classList.add('drag-over');
  });
  container.addEventListener('drop', function(e) {
    var item = e.target.closest('.selected-book');
    if (!item) return;
    e.preventDefault();
    var targetIdx = parseInt(item.getAttribute('data-idx'));
    if (dragSrcIdx === null || dragSrcIdx === targetIdx) return;
    var moved = selectedBooks.splice(dragSrcIdx, 1)[0];
    selectedBooks.splice(targetIdx, 0, moved);
    renderSelected();
  });
  container.addEventListener('click', function(e) {
    var removeBtn = e.target.closest('[data-remove-idx]');
    if (removeBtn) {
      removeBook(parseInt(removeBtn.getAttribute('data-remove-idx')));
    }
  });
}

function filterBooks() {
  var q = document.getElementById('bookFilter').value.toLowerCase();
  var hideEl = document.getElementById('hideInSeries');
  var hideSeries = hideEl && hideEl.checked;
  var items = document.querySelectorAll('.avail-book');
  for (var i = 0; i < items.length; i++) {
    var title = items[i].getAttribute('data-title').toLowerCase();

function saveSeries() {
  var name = document.getElementById('newSeriesName').value.trim();
  if (!name) { setStatus('Enter a series name'); return; }
  if (selectedBooks.length < 2) { setStatus('Select at least 2 books'); return; }

  var asin = document.getElementById('newSeriesAsin').value.trim();
  var books = [];

  var badgeMode = 'none';

    + '&asin=' + encodeURIComponent(asin)

function ssSetupDropZone() {

var _ssEditor = null;

function ssProcessFile(file) {
  var statusEl = document.getElementById('ssUploadStatus');
  var previewEl = document.getElementById('ssPreview');
  var zone = document.getElementById('ssDropZone');
  var targetW = parseInt(zone.getAttribute('data-width'));
  var targetH = parseInt(zone.getAttribute('data-height'));

  if (targetW === 0 || targetH === 0) {
    statusEl.textContent = 'Select your device model first.';
    return;
  }

  statusEl.textContent = 'Loading image...';

  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var fitScale = Math.max(targetW / img.width, targetH / img.height);
      _ssEditor = {
        img: img, targetW: targetW, targetH: targetH,
        zoom: 1, panX: 0, panY: 0, fitScale: fitScale,
        dragging: false, dragStartX: 0, dragStartY: 0, dragPanX: 0, dragPanY: 0
      };

      var editorSize = 300;
      var displayScale = editorSize / Math.max(targetW, targetH);
      var cw = Math.round(targetW * displayScale);
      var ch = Math.round(targetH * displayScale);

      previewEl.style.display = 'block';
      previewEl.innerHTML =
        '<div style="font-size:13px;color:var(--fg-muted);margin-bottom:8px;">Adjust crop (' + targetW + 'x' + targetH + ')</div>'
        + '<canvas id="ssEditorCanvas" width="' + cw + '" height="' + ch + '" style="border:1px solid var(--border);border-radius:4px;cursor:grab;display:block;"></canvas>'
        + '<div style="display:flex;align-items:center;gap:8px;margin-top:8px;">'
        + '<span style="font-size:12px;color:var(--fg-muted);">Zoom</span>'
        + '<input id="ssZoomSlider" type="range" min="100" max="500" value="100" style="flex:1;" oninput="ssEditorZoom(this.value)">'
        + '<span id="ssZoomLabel" style="font-size:12px;color:var(--fg-muted);min-width:36px;">100%</span>'
        + '</div>'
        + '<div style="display:flex;gap:8px;margin-top:8px;">'
        + '<button class="btn" style="font-size:12px;padding:4px 12px;" onclick="ssEditorCenter()">Center</button>'
        + '<button class="btn" style="font-size:12px;padding:4px 12px;" onclick="ssEditorReset()">Reset</button>'
        + '<button class="btn btn-primary" style="font-size:12px;padding:4px 12px;margin-left:auto;" onclick="ssEditorConfirm()">Upload Screensaver</button>'
        + '</div>';

      var c = document.getElementById('ssEditorCanvas');
      c.addEventListener('mousedown', ssEditorMouseDown);
      c.addEventListener('mousemove', ssEditorMouseMove);
      c.addEventListener('mouseup', ssEditorMouseUp);
      c.addEventListener('mouseleave', ssEditorMouseUp);
      c.addEventListener('touchstart', ssEditorTouchStart, {passive: false});
      c.addEventListener('touchmove', ssEditorTouchMove, {passive: false});
      c.addEventListener('touchend', ssEditorMouseUp);

      ssEditorDraw();
      statusEl.textContent = 'Drag to pan, use slider to zoom.';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function ssEditorDraw() {
  if (!_ssEditor) return;
  var e = _ssEditor;
  var c = document.getElementById('ssEditorCanvas');
  if (!c) return;
  var ctx = c.getContext('2d');
  var dw = c.width, dh = c.height;

  ctx.fillStyle = '#808080';
  ctx.fillRect(0, 0, dw, dh);

  var displayScale = dw / e.targetW;
  var s = e.fitScale * e.zoom;
  var iw = e.img.width * s * displayScale;
  var ih = e.img.height * s * displayScale;
  var ix = (dw - iw) / 2 + e.panX * displayScale;
  var iy = (dh - ih) / 2 + e.panY * displayScale;

  ctx.drawImage(e.img, ix, iy, iw, ih);

  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1;
  for (var i = 1; i < 3; i++) {
    ctx.beginPath();
    ctx.moveTo(dw * i / 3, 0);
    ctx.lineTo(dw * i / 3, dh);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, dh * i / 3);
    ctx.lineTo(dw, dh * i / 3);
    ctx.stroke();
  }
}

function ssEditorZoom(val) {
  if (!_ssEditor) return;
  _ssEditor.zoom = parseInt(val) / 100;
  document.getElementById('ssZoomLabel').textContent = val + '%';
  ssEditorDraw();
}

function ssEditorCenter() {
  if (!_ssEditor) return;
  _ssEditor.panX = 0;
  _ssEditor.panY = 0;
  ssEditorDraw();
}

function ssEditorReset() {
  if (!_ssEditor) return;
  _ssEditor.zoom = 1;
  _ssEditor.panX = 0;
  _ssEditor.panY = 0;
  document.getElementById('ssZoomSlider').value = 100;
  document.getElementById('ssZoomLabel').textContent = '100%';
  ssEditorDraw();
}

function ssEditorMouseDown(ev) {
  if (!_ssEditor) return;
  _ssEditor.dragging = true;
  _ssEditor.dragStartX = ev.clientX;
  _ssEditor.dragStartY = ev.clientY;
  _ssEditor.dragPanX = _ssEditor.panX;
  _ssEditor.dragPanY = _ssEditor.panY;
  ev.target.style.cursor = 'grabbing';
}

var _ssDrawFrame = null;

function ssEditorMouseMove(ev) {
  if (!_ssEditor || !_ssEditor.dragging) return;
  var c = document.getElementById('ssEditorCanvas');
  var displayScale = c.width / _ssEditor.targetW;
  _ssEditor.panX = _ssEditor.dragPanX + (ev.clientX - _ssEditor.dragStartX) / displayScale;
  _ssEditor.panY = _ssEditor.dragPanY + (ev.clientY - _ssEditor.dragStartY) / displayScale;
  if (!_ssDrawFrame) {
    _ssDrawFrame = requestAnimationFrame(function() { _ssDrawFrame = null; ssEditorDraw(); });
  }
}

function ssEditorMouseUp(ev) {
  if (!_ssEditor) return;
  _ssEditor.dragging = false;
  if (ev.target) ev.target.style.cursor = 'grab';
}

function ssEditorTouchStart(ev) {
  if (!_ssEditor || ev.touches.length !== 1) return;
  ev.preventDefault();
  var t = ev.touches[0];
  _ssEditor.dragging = true;
  _ssEditor.dragStartX = t.clientX;
  _ssEditor.dragStartY = t.clientY;
  _ssEditor.dragPanX = _ssEditor.panX;
  _ssEditor.dragPanY = _ssEditor.panY;
}

function ssEditorTouchMove(ev) {
  if (!_ssEditor || !_ssEditor.dragging || ev.touches.length !== 1) return;
  ev.preventDefault();
  var t = ev.touches[0];
  var c = document.getElementById('ssEditorCanvas');
  var displayScale = c.width / _ssEditor.targetW;
  _ssEditor.panX = _ssEditor.dragPanX + (t.clientX - _ssEditor.dragStartX) / displayScale;
  _ssEditor.panY = _ssEditor.dragPanY + (t.clientY - _ssEditor.dragStartY) / displayScale;
  if (!_ssDrawFrame) {
    _ssDrawFrame = requestAnimationFrame(function() { _ssDrawFrame = null; ssEditorDraw(); });
  }
}

function ssEditorConfirm() {
  if (!_ssEditor) return;
  var e = _ssEditor;
  var statusEl = document.getElementById('ssUploadStatus');
  statusEl.textContent = 'Processing...';

  var canvas = document.createElement('canvas');
  canvas.width = e.targetW;
  canvas.height = e.targetH;
  var ctx = canvas.getContext('2d');

  ctx.fillStyle = '#808080';
  ctx.fillRect(0, 0, e.targetW, e.targetH);

  var s = e.fitScale * e.zoom;
  var iw = e.img.width * s;
  var ih = e.img.height * s;
  var ix = (e.targetW - iw) / 2 + e.panX;
  var iy = (e.targetH - ih) / 2 + e.panY;
  ctx.drawImage(e.img, ix, iy, iw, ih);

  var imageData = ctx.getImageData(0, 0, e.targetW, e.targetH);
  var d = imageData.data;
  for (var i = 0; i < d.length; i += 4) {
    var gray = Math.round(d[i] * 0.299 + d[i+1] * 0.587 + d[i+2] * 0.114);
    d[i] = gray; d[i+1] = gray; d[i+2] = gray; d[i+3] = 255;
  }

  statusEl.textContent = 'Encoding 8-bit grayscale PNG...';
  PngCodec.encodePng({ data: imageData.data, width: e.targetW, height: e.targetH }, {
    colorType: 0,
    bitDepth: 8
  }).then(function(result) {
    var bin = '';
    var bytes = result.data;
    for (var i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
    window._ssUploadData = btoa(bin);
    statusEl.textContent = 'Encoded (' + Math.round(bytes.length / 1024) + 'KB). Uploading...';
    ssUpload();
  }).catch(function(err) {
    statusEl.textContent = 'Encode error: ' + err;
  });
}

function ssUpload() {
  if (!window._ssUploadData) return;
  var statusEl = document.getElementById('ssUploadStatus');

  fetch('/cgi-bin/ssupload.cgi', {

var uploadQueue = [];
var uploadFolders = [];
var _uploadInProgress = false;
var ALLOWED_EXTENSIONS = ['azw3', 'azw', 'mobi', 'kfx', 'epub', 'pdf'];

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

function loadUpload() {
  if (_uploadInProgress) {
    setActive('upload');
    renderUploadTab();
    return;
  }
  setActive('upload');
  setStatus('');
  uploadQueue = [];

  fetch('/cgi-bin/books_browse.cgi')
    .then(function(r) { return r.json(); })
    .then(function(folders) {
      uploadFolders = folders;
      renderUploadTab();
    })
    .catch(function() {
      uploadFolders = [];
      renderUploadTab();
    });
}

function renderUploadTab() {
  var html = '<div class="card">'
    + '<div class="card-header"><span class="card-title">Upload Books</span></div>'
    + '<p style="font-size:14px;color:var(--fg-muted);margin:0 0 16px 0;">'
    + 'Transfer ebook files wirelessly to your Kindle. Supported formats: AZW3, MOBI, KFX, EPUB, PDF</p>'
    + '<div style="margin-bottom:16px;">'
    + '<div class="panel-header">Destination folder</div>'
    + '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">'
    + '<select id="uploadFolder" class="input-field input-small" style="margin-bottom:0;flex:1;min-width:160px;">'
    + '<option value="">documents/ (root)</option>';

  for (var i = 0; i < uploadFolders.length; i++) {
    html += '<option value="' + escapeHtml(uploadFolders[i]) + '">documents/' + escapeHtml(uploadFolders[i]) + '/</option>';
  }

  html += '</select>'
    + '<span style="font-size:13px;color:var(--fg-faint);">or</span>'
    + '<input id="uploadNewFolder" class="input-field input-small" style="margin-bottom:0;flex:1;min-width:140px;" placeholder="New folder name">'
    + '</div></div>'
    + '<div id="uploadDropZone" class="upload-drop-zone">'
    + '<div style="font-size:24px;opacity:0.3;margin-bottom:8px;">&#x1F4E4;</div>'
    + '<div>Drop ebook files here or click to select</div>'
    + '<div style="font-size:12px;color:var(--fg-fainter);margin-top:4px;">.azw3, .mobi, .kfx, .epub, .pdf</div>'
    + '<input type="file" id="uploadFileInput" multiple accept=".azw3,.azw,.mobi,.kfx,.epub,.pdf" style="display:none">'
    + '</div>'
    + '<div id="uploadQueue"></div>'
    + '<div id="uploadActions" style="display:none;margin-top:12px;align-items:center;gap:8px;">'
    + '<button class="btn btn-primary" onclick="uploadAll()">Upload All</button>'
    + '<button class="btn" onclick="uploadClear()">Clear</button>'
    + '<span id="uploadSummary" style="font-size:13px;color:var(--fg-muted);margin-left:auto;"></span>'
    + '</div>'
    + '<div id="uploadResult" style="display:none;margin-top:12px;padding:12px;border-radius:6px;font-size:14px;"></div>'
    + '</div>';

  document.getElementById('content').innerHTML = html;
  uploadSetupDropZone();
  renderUploadQueue();
}

function uploadSetupDropZone() {
  var zone = document.getElementById('uploadDropZone');
  var fileInput = document.getElementById('uploadFileInput');
  if (!zone || !fileInput) return;

  zone.addEventListener('click', function(e) {
    if (e.target === fileInput) return;
    fileInput.click();
  });
  zone.addEventListener('dragover', function(e) {
    e.preventDefault();
    zone.classList.add('drag-active');
  });
  zone.addEventListener('dragleave', function() {
    zone.classList.remove('drag-active');
  });
  zone.addEventListener('drop', function(e) {
    e.preventDefault();
    zone.classList.remove('drag-active');
    uploadAddFiles(e.dataTransfer.files);
  });
  fileInput.addEventListener('change', function() {
    uploadAddFiles(fileInput.files);
    fileInput.value = '';
  });
}

function uploadAddFiles(files) {
  var rejected = [];
  for (var i = 0; i < files.length; i++) {
    var file = files[i];
    var ext = file.name.split('.').pop().toLowerCase();
    if (ALLOWED_EXTENSIONS.indexOf(ext) === -1) {
      rejected.push(file.name);
      continue;
    }
    var isDup = uploadQueue.some(function(item) {
      return item.name === file.name && item.size === file.size;
    });
    if (isDup) continue;
    uploadQueue.push({ file: file, name: file.name, size: file.size, status: 'pending', message: '' });
  }
  renderUploadQueue();
  if (rejected.length > 0) {
    setStatus('Skipped unsupported: ' + rejected.join(', ') + '. Convert with Calibre first.');
  }
}

function uploadRemove(index) {
  uploadQueue.splice(index, 1);
  renderUploadQueue();
}

function uploadClear() {
  uploadQueue = uploadQueue.filter(function(item) { return item.status === 'uploading'; });
  renderUploadQueue();
}

function renderUploadQueue() {
  var container = document.getElementById('uploadQueue');
  var actionsEl = document.getElementById('uploadActions');
  if (!container) return;

  if (uploadQueue.length === 0) {
    container.innerHTML = '';
    if (actionsEl) actionsEl.style.display = 'none';
    return;
  }

  if (actionsEl) actionsEl.style.display = 'flex';

  var totalSize = 0;
  var html = '<div style="margin-top:12px;border:1px solid var(--border);border-radius:6px;overflow:hidden;">';
  for (var i = 0; i < uploadQueue.length; i++) {
    var item = uploadQueue[i];
    totalSize += item.size;
    var statusIcon = '', statusClass = '';
    switch (item.status) {
      case 'pending': statusIcon = '&#x23F3;'; break;
      case 'uploading': statusIcon = '&#x1F504;'; statusClass = ' uploading'; break;
      case 'done': statusIcon = '&#x2705;'; break;
      case 'error': statusIcon = '&#x274C;'; break;
    }
    html += '<div class="upload-file-item' + statusClass + '">'
      + '<span class="upload-file-status">' + statusIcon + '</span>'
      + '<span class="upload-file-name">' + escapeHtml(item.name) + '</span>'
      + '<span class="upload-file-size">' + formatSize(item.size) + '</span>';
    if (item.status === 'error' && item.message) {
      html += '<span class="upload-file-error" title="' + escapeHtml(item.message) + '">' + escapeHtml(item.message) + '</span>';
    }
    if (item.status === 'pending') {
      html += '<span class="upload-file-remove" onclick="uploadRemove(' + i + ')">&times;</span>';
    }
    html += '</div>';
  }
  html += '</div>';
  container.innerHTML = html;

  var summaryEl = document.getElementById('uploadSummary');
  if (summaryEl) {
    var doneCount = uploadQueue.filter(function(it) { return it.status === 'done'; }).length;
    summaryEl.textContent = uploadQueue.length + ' file' + (uploadQueue.length !== 1 ? 's' : '')
      + ' (' + formatSize(totalSize) + ')'
      + (doneCount > 0 ? ' \u2014 ' + doneCount + ' uploaded' : '');
  }
}

function getUploadSubfolder() {
  var newFolder = document.getElementById('uploadNewFolder');
  if (newFolder && newFolder.value.trim()) return newFolder.value.trim();
  var select = document.getElementById('uploadFolder');
  return select ? select.value : '';
}

function uploadAll() {
  if (_uploadInProgress) return;
  _uploadInProgress = true;

  var pending = uploadQueue.filter(function(item) { return item.status === 'pending'; });
  if (pending.length === 0) { _uploadInProgress = false; return; }

  var subfolder = getUploadSubfolder();
  setStatus('Uploading ' + pending.length + ' file' + (pending.length !== 1 ? 's' : '') + '...');

  var btn = document.querySelector('#uploadActions .btn-primary');
  if (btn) { btn.disabled = true; btn.textContent = 'Uploading...'; }

  uploadNext(0, subfolder);
}

function uploadNext(index, subfolder) {
  while (index < uploadQueue.length && uploadQueue[index].status !== 'pending') {
    index++;
  }
  if (index >= uploadQueue.length) {
    _uploadInProgress = false;
    var btn = document.querySelector('#uploadActions .btn-primary');
    if (btn) { btn.disabled = false; btn.textContent = 'Upload All'; }

    var doneCount = uploadQueue.filter(function(it) { return it.status === 'done'; }).length;
    var errCount = uploadQueue.filter(function(it) { return it.status === 'error'; }).length;

    if (doneCount > 0) {
      setStatus('Uploaded ' + doneCount + ' file' + (doneCount !== 1 ? 's' : '')
        + (errCount > 0 ? ' (' + errCount + ' failed)' : '') + '. Refreshing library...');
      uploadRefreshLibrary();
    } else {
      setStatus('Upload failed for all files.');
    }
    return;
  }

  var item = uploadQueue[index];
  item.status = 'uploading';
  renderUploadQueue();

  var doneCount = uploadQueue.filter(function(it) { return it.status === 'done'; }).length;
  var total = uploadQueue.filter(function(it) { return it.status !== 'error'; }).length;
  setStatus('Uploading ' + (doneCount + 1) + ' of ' + total + ': ' + item.name);

  var reader = new FileReader();
  reader.onload = function(e) {
    var url = '/cgi-bin/upload_book.cgi?filename=' + encodeURIComponent(item.name)
      + '&subfolder=' + encodeURIComponent(subfolder);
    fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/octet-stream' },
      body: e.target.result
    })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.status === 'ok') {
          item.status = 'done';
          item.message = data.filename;
        } else {
          item.status = 'error';
          item.message = data.message || 'Unknown error';
        }
        renderUploadQueue();
        uploadNext(index + 1, subfolder);
      })
      .catch(function(err) {
        item.status = 'error';
        item.message = err.toString();
        renderUploadQueue();
        uploadNext(index + 1, subfolder);
      });
  };
  reader.onerror = function() {
    item.status = 'error';
    item.message = 'Failed to read file';
    renderUploadQueue();
    uploadNext(index + 1, subfolder);
  };
  reader.readAsArrayBuffer(item.file);
}

function uploadRefreshLibrary() {
  fetch('/cgi-bin/refresh_library.cgi', { method: 'POST' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var resultEl = document.getElementById('uploadResult');
      if (!resultEl) return;
      resultEl.style.display = 'block';
      var doneCount = uploadQueue.filter(function(it) { return it.status === 'done'; }).length;
      if (data.status === 'ok') {
        resultEl.style.background = 'var(--surface-alt)';
        resultEl.style.border = '1px solid var(--border)';
        resultEl.textContent = doneCount + ' book' + (doneCount !== 1 ? 's' : '')
          + ' uploaded. Library refreshed \u2014 books should appear on your Kindle shortly.';
        setStatus('');
      } else {
        resultEl.style.background = 'var(--danger-bg)';
        resultEl.style.border = '1px solid var(--danger-border)';
        resultEl.textContent = doneCount + ' book' + (doneCount !== 1 ? 's' : '')
          + ' uploaded, but library refresh failed: ' + (data.message || 'unknown error')
          + '. Restart your Kindle to see new books.';
        setStatus('');
      }
    })
    .catch(function(e) {
      setStatus('Files uploaded but library refresh failed: ' + e + '. Restart the Kindle to see new books.');
    });
}

var calState = {
  url: '', allBooks: [], filtered: [], page: 0, perPage: 25,
  sort: 'timestamp', order: 'desc', search: '',
  selected: {}, downloading: false,
  kindleTitles: [], hideOnDevice: false
};

function loadCalibre() {
  setActive('calibre');
  setStatus('');
  Promise.all([
    fetch('/cgi-bin/calibre_config.cgi').then(function(r) { return r.json(); }),
    fetch('/cgi-bin/kindle_titles.cgi').then(function(r) { return r.json(); }).catch(function() { return []; })
  ]).then(function(results) {
    calState.url = results[0].url || '';
    calState.kindleTitles = results[1] || [];
    calBuildTitleLookup();
    renderCalibreTab();
  }).catch(function() { renderCalibreTab(); });
}

function renderCalibreTab() {
  var html = '<div class="card">'
    + '<div class="card-header"><span class="card-title">Calibre Library</span></div>'
    + '<div style="margin-bottom:12px;">'
    + '<div class="panel-header">Calibre Server URL</div>'
    + '<div style="display:flex;gap:8px;align-items:center;">'
    + '<input type="text" id="calUrl" class="input-field input-small" style="margin-bottom:0;flex:1;" placeholder="http://192.168.1.100:8080" value="' + escapeHtml(calState.url) + '">'
    + '<button class="btn btn-primary" onclick="calScan()">Scan</button>'
    + '</div></div>'
    + '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px;">'
    + '<input type="text" id="calSearch" class="input-field input-small" style="margin-bottom:0;flex:1;min-width:120px;" placeholder="Search..." value="' + escapeHtml(calState.search) + '"'
    + ' oninput="calState.search=this.value;calApplyFilterDebounced();">'
    + '<select id="calSort" class="input-field input-small" style="margin-bottom:0;width:auto;" onchange="calState.sort=this.value;calApplyFilter();">'
    + '<option value="timestamp"' + (calState.sort==='timestamp'?' selected':'') + '>Date</option>'
    + '<option value="title"' + (calState.sort==='title'?' selected':'') + '>Title</option>'
    + '<option value="authors"' + (calState.sort==='authors'?' selected':'') + '>Author</option>'
    + '<option value="series"' + (calState.sort==='series'?' selected':'') + '>Series</option>'
    + '</select>'
    + '<select id="calOrder" class="input-field input-small" style="margin-bottom:0;width:auto;" onchange="calState.order=this.value;calApplyFilter();">'
    + '<option value="desc"' + (calState.order==='desc'?' selected':'') + '>Desc</option>'
    + '<option value="asc"' + (calState.order==='asc'?' selected':'') + '>Asc</option>'
    + '</select>'
    + '</div>'
    + '<label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--fg-muted);margin-bottom:12px;cursor:pointer;user-select:none;"><input type="checkbox" id="calHideOnDevice"' + (calState.hideOnDevice ? ' checked' : '') + ' onchange="calState.hideOnDevice=this.checked;calApplyFilter();"> Hide books already on Kindle</label>'
    + '<div id="calBooks"></div>'
    + '<div id="calPagination"></div>'
    + '<div id="calBulk" style="display:none;margin-top:12px;display:flex;gap:8px;align-items:center;">'
    + '<button class="btn btn-primary" id="calDlSelected" onclick="calDownloadSelected()">Download Selected (<span id="calSelCount">0</span>)</button>'
    + '<button class="btn" onclick="calSelectAll()">Select All</button>'
    + '<button class="btn" onclick="calSelectNone()">Select None</button>'
    + '</div>'
    + '<div id="calResult" style="display:none;margin-top:12px;padding:12px;border-radius:6px;font-size:14px;"></div>'
    + '</div>';

  document.getElementById('content').innerHTML = html;
  renderCalBooks();
}

function calProxy(apiPath) {
  return fetch('/cgi-bin/calibre_proxy.cgi?url=' + encodeURIComponent(calState.url)
    + '&path=' + encodeURIComponent(apiPath))
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status + ' from proxy');
      return r.json();
    })
    .then(function(data) {
      if (data.error) throw new Error(data.error);
      return data;
    });
}

function calTransformBooks(booksObj, idOrder) {
  var result = [];
  for (var i = 0; i < idOrder.length; i++) {
    var b = booksObj[String(idOrder[i])];
    if (!b) continue;
    var fmt = '', dl = '';
    if (b.main_format) {
      var fmtKeys = Object.keys(b.main_format);
      if (fmtKeys.length > 0) { fmt = fmtKeys[0]; dl = b.main_format[fmtKeys[0]]; }
    }
    var date = '';
    if (b.timestamp && b.timestamp !== 'None') {
      date = b.timestamp.split('T')[0];
    }
    result.push({
      title: b.title || '',
      authors: (b.authors || []).join(', '),
      date: date,
      format: fmt,
      download: dl,
      thumb: b.thumbnail || '',
      series: b.series || null,
      series_index: b.series_index || null,
      formats: b.formats || [],
      _onDevice: false
    });
  }
  return result;
}

function calScan() {
  var url = document.getElementById('calUrl').value.trim();
  if (!url) { setStatus('Enter a Calibre server URL'); return; }
  calState.url = url;
  setStatus('Scanning Calibre library...');

  fetch('/cgi-bin/calibre_config.cgi', {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: 'url=' + encodeURIComponent(url)
  }).catch(function() {});

  Promise.all([
    calProxy('/ajax/search?num=99999'),
    fetch('/cgi-bin/kindle_titles.cgi').then(function(r) { return r.json(); }).catch(function() { return []; })
  ]).then(function(results) {
    calState.kindleTitles = results[1] || [];
    calBuildTitleLookup();
    var searchData = results[0];
    var ids = searchData.book_ids || [];
    if (ids.length === 0) {
      calState.allBooks = [];
      calApplyFilter();
      setStatus('Calibre library is empty');
      return;
    }

    setStatus('Loading ' + ids.length + ' books...');
    var batches = [];
    for (var i = 0; i < ids.length; i += 100) {
      batches.push(ids.slice(i, i + 100));
    }

    var allBooksObj = {};
    var chain = Promise.resolve();
    batches.forEach(function(batch, idx) {
      chain = chain.then(function() {
        setStatus('Loading books (' + Math.min((idx + 1) * 100, ids.length) + '/' + ids.length + ')...');
        return calProxy('/ajax/books?ids=' + batch.join(','));
      }).then(function(booksData) {
        var keys = Object.keys(booksData);
        for (var j = 0; j < keys.length; j++) allBooksObj[keys[j]] = booksData[keys[j]];
      });
    });

    return chain.then(function() {
      calState.allBooks = calTransformBooks(allBooksObj, ids);
      for (var k = 0; k < calState.allBooks.length; k++) {
        calState.allBooks[k]._onDevice = calIsOnDevice(calState.allBooks[k].title);
      }
      calState.page = 0;
      calApplyFilter();
      setStatus('Loaded ' + calState.allBooks.length + ' books from Calibre');
    });
  }).catch(function(e) { setStatus('Error: ' + e.message); });
}

function calNormalizeTitle(t) {
  return (t || '').trim().toLowerCase().replace(/\s+/g, ' ');
}

function calBuildTitleLookup() {
  var lookup = {};
  for (var i = 0; i < calState.kindleTitles.length; i++) {
    var n = calNormalizeTitle(calState.kindleTitles[i]);
    if (n) lookup[n] = true;
  }
  calState._titleLookup = lookup;
}

function calIsOnDevice(title) {
  if (!calState._titleLookup) return false;
  var n = calNormalizeTitle(title);
  return n ? calState._titleLookup[n] === true : false;
}

function calApplyFilter() {
  var q = calState.search.toLowerCase();
  var list = calState.allBooks.filter(function(b) {
    if (calState.hideOnDevice && b._onDevice) return false;
    if (q && b.title.toLowerCase().indexOf(q) < 0
        && b.authors.toLowerCase().indexOf(q) < 0
        && (!b.series || b.series.toLowerCase().indexOf(q) < 0)) return false;
    return true;
  });

  var sortKey = calState.sort;
  list.sort(function(a, b) {
    var va = '', vb = '';
    if (sortKey === 'title') { va = a.title.toLowerCase(); vb = b.title.toLowerCase(); }
    else if (sortKey === 'authors') { va = a.authors.toLowerCase(); vb = b.authors.toLowerCase(); }
    else if (sortKey === 'series') { va = (a.series || '').toLowerCase(); vb = (b.series || '').toLowerCase(); }
    else { va = a.date; vb = b.date; }
    if (va < vb) return -1;
    if (va > vb) return 1;
    return 0;
  });
  if (calState.order === 'desc') list.reverse();

  calState.filtered = list;
  calState.page = 0;
  renderCalBooks();
  renderCalPagination();
}

var calApplyFilterDebounced = debounce(calApplyFilter, 300);

function calGetPage() {
  var start = calState.page * calState.perPage;
  return calState.filtered.slice(start, start + calState.perPage);
}

function renderCalBooks() {
  var container = document.getElementById('calBooks');
  var bulkEl = document.getElementById('calBulk');
  if (!container) return;

  if (calState.allBooks.length === 0) {
    container.innerHTML = '<div class="empty-state">No books loaded. Enter your Calibre URL and click Scan.</div>';
    if (bulkEl) bulkEl.style.display = 'none';
    return;
  }

  var pageBooks = calGetPage();
  if (calState.filtered.length === 0) {
    container.innerHTML = '<div class="empty-state">No books match the current filters.</div>';
    if (bulkEl) bulkEl.style.display = 'none';
    return;
  }

  if (bulkEl) bulkEl.style.display = 'flex';

  var html = '<div style="border:1px solid var(--border);border-radius:6px;overflow:hidden;">';
  for (var i = 0; i < pageBooks.length; i++) {
    var b = pageBooks[i];
    var thumbUrl = b.thumb ? '/cgi-bin/calibre_thumb.cgi?path=' + encodeURIComponent(b.thumb) : '';
    var checked = calState.selected[b.download] ? ' checked' : '';
    html += '<div class="cal-book">'
      + (thumbUrl ? '<img class="cal-book-thumb" src="' + thumbUrl + '" onerror="this.style.visibility=\'hidden\'">' : '<div class="cal-book-thumb"></div>')
      + '<div class="cal-book-info">'
      + '<div class="cal-book-title">' + escapeHtml(b.title) + '</div>'
      + '<div class="cal-book-meta">' + (b.authors ? escapeHtml(b.authors) + ' &middot; ' : '')
      + escapeHtml(b.format || '') + (b.date ? ' &middot; ' + escapeHtml(b.date) : '')
      + (b._onDevice ? ' &middot; <span style="color:var(--fg-fainter);">on device</span>' : '') + '</div>'
      + '</div>'
      + '<div class="cal-book-actions">'
      + '<input type="checkbox" class="cal-check" data-dl="' + escapeHtml(b.download) + '"' + checked + ' onchange="calToggleSelect(this)">'
      + '<button class="btn" style="font-size:12px;padding:4px 10px;" data-dl="' + escapeHtml(b.download) + '" onclick="calDownloadByDl(this.dataset.dl)">Download</button>'
      + '</div></div>';
  }
  html += '</div>';
  container.innerHTML = html;
  calUpdateCount();
}

function renderCalPagination() {
  var el = document.getElementById('calPagination');
  if (!el || calState.filtered.length === 0) { if (el) el.innerHTML = ''; return; }

  var total = calState.filtered.length;
  var start = calState.page * calState.perPage + 1;
  var end = Math.min(start + calState.perPage - 1, total);
  var totalPages = Math.ceil(total / calState.perPage);
  var hasPrev = calState.page > 0;
  var hasNext = calState.page < totalPages - 1;

  var html = '<div class="cal-pagination">'
    + '<span>Books ' + start + ' to ' + end + ' of ' + total + '</span>'
    + '<div class="cal-pagination-btns">';
  if (hasPrev) {
    html += '<button class="btn" style="font-size:12px;padding:4px 10px;" onclick="calPage(0)">First</button>'
      + '<button class="btn" style="font-size:12px;padding:4px 10px;" onclick="calPage(' + (calState.page - 1) + ')">Prev</button>';
  }
  if (hasNext) {
    html += '<button class="btn" style="font-size:12px;padding:4px 10px;" onclick="calPage(' + (calState.page + 1) + ')">Next</button>'
      + '<button class="btn" style="font-size:12px;padding:4px 10px;" onclick="calPage(' + (totalPages - 1) + ')">Last</button>';
  }
  html += '</div></div>';
  el.innerHTML = html;
}

function calPage(page) {
  calState.page = page;
  renderCalBooks();
  renderCalPagination();
}

function calToggleSelect(checkbox) {
  var dl = checkbox.getAttribute('data-dl');
  if (checkbox.checked) calState.selected[dl] = true;
  else delete calState.selected[dl];
  calUpdateCount();
}

function calSelectAll() {
  var pageBooks = calGetPage();
  for (var i = 0; i < pageBooks.length; i++) {
    calState.selected[pageBooks[i].download] = true;
  }
  var checks = document.querySelectorAll('.cal-check');
  for (var j = 0; j < checks.length; j++) checks[j].checked = true;
  calUpdateCount();
}

function calSelectNone() {
  calState.selected = {};
  var checks = document.querySelectorAll('.cal-check');
  for (var j = 0; j < checks.length; j++) checks[j].checked = false;
  calUpdateCount();
}

function calUpdateCount() {
  var el = document.getElementById('calSelCount');
  if (el) el.textContent = Object.keys(calState.selected).length;
}

function calMakeFilename(book) {
  var name = (book.title || 'book').replace(/[\/\\:*?"<>|]/g, '_');
  if (book.authors) name += ' - ' + book.authors.replace(/[\/\\:*?"<>|]/g, '_');
  return name + '.' + (book.format || 'kfx').toLowerCase();
}

function calFindBook(dl) {
  for (var i = 0; i < calState.allBooks.length; i++) {
    if (calState.allBooks[i].download === dl) return calState.allBooks[i];
  }
  return null;
}

function calMarkOnDevice(b) {
  var n = calNormalizeTitle(b.title);
  if (n) {
    calState.kindleTitles.push(b.title);
    if (calState._titleLookup) calState._titleLookup[n] = true;
  }
  b._onDevice = true;
}

function calDownloadByDl(dl) {
  var b = calFindBook(dl);
  if (!b) return;
  setStatus('Downloading: ' + b.title + '...');
  fetch('/cgi-bin/calibre_download.cgi', {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: 'calibre_url=' + encodeURIComponent(calState.url)
      + '&download=' + encodeURIComponent(b.download)
      + '&filename=' + encodeURIComponent(calMakeFilename(b))
  })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.status === 'ok') {
        calMarkOnDevice(b);
        calApplyFilter();
        setStatus('Downloaded: ' + data.filename);
      } else {
        setStatus('Failed: ' + (data.message || 'unknown error'));
      }
    })
    .catch(function(e) { setStatus('Error: ' + e); });
}

function calDownloadSelected() {
  var paths = Object.keys(calState.selected);
  if (paths.length === 0) { setStatus('No books selected'); return; }
  calState.downloading = true;
  setStatus('Downloading ' + paths.length + ' book' + (paths.length !== 1 ? 's' : '') + '...');
  calDownloadNext(paths, 0, 0, 0);
}

function calDownloadNext(paths, idx, doneCount, errCount) {
  if (idx >= paths.length) {
    calState.downloading = false;
    var msg = 'Downloaded ' + doneCount + ' book' + (doneCount !== 1 ? 's' : '');
    if (errCount > 0) msg += ' (' + errCount + ' failed)';
    msg += '. Refreshing library...';
    setStatus(msg);
    calRefreshLibrary(doneCount, errCount);
    return;
  }

  var dl = paths[idx];
  var book = calFindBook(dl);
  setStatus('Downloading ' + (idx + 1) + ' of ' + paths.length + ': ' + (book ? book.title : ''));

  fetch('/cgi-bin/calibre_download.cgi', {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: 'calibre_url=' + encodeURIComponent(calState.url)
      + '&download=' + encodeURIComponent(dl)
      + '&filename=' + encodeURIComponent(book ? calMakeFilename(book) : '')
  })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.status === 'ok') {
        doneCount++;
        if (book) calMarkOnDevice(book);
      } else errCount++;
      calDownloadNext(paths, idx + 1, doneCount, errCount);
    })
    .catch(function() {
      errCount++;
      calDownloadNext(paths, idx + 1, doneCount, errCount);
    });
}

function calRefreshLibrary(doneCount, errCount) {
  fetch('/cgi-bin/refresh_library.cgi', { method: 'POST' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var resultEl = document.getElementById('calResult');
      if (!resultEl) return;
      resultEl.style.display = 'block';
      if (data.status === 'ok') {
        resultEl.style.background = 'var(--surface-alt)';
        resultEl.style.border = '1px solid var(--border)';
        resultEl.textContent = doneCount + ' book' + (doneCount !== 1 ? 's' : '')
          + ' downloaded from Calibre. Library refreshed.';
        setStatus('');
      } else {
        resultEl.style.background = 'var(--danger-bg)';
        resultEl.style.border = '1px solid var(--danger-border)';
        resultEl.textContent = doneCount + ' book' + (doneCount !== 1 ? 's' : '')
          + ' downloaded, but library refresh failed. Restart your Kindle to see new books.';
        setStatus('');
      }
    })
    .catch(function(e) {
      setStatus('Books downloaded but library refresh failed: ' + e);
    });
  calState.selected = {};
  calApplyFilter();
}

  setActive('fonts');
  setStatus('Loading...');

    .then(function(r) { return r.text(); })
    .then(function(text) {

    })
    .catch(function(e) { setStatus('Error: ' + e); });

function fontSetupDropZone() {
  var zone = document.getElementById('fontDropZone');
  var fileInput = document.getElementById('fontFileInput');
  if (!zone || !fileInput) return;

  zone.addEventListener('click', function() { fileInput.click(); });
  zone.addEventListener('dragover', function(e) {
    e.preventDefault();
    zone.style.borderColor = 'var(--accent)';
  });
  zone.addEventListener('dragleave', function() {
    zone.style.borderColor = 'var(--input-border)';
  });
  zone.addEventListener('drop', function(e) {
    e.preventDefault();
    zone.style.borderColor = 'var(--input-border)';
    if (e.dataTransfer.files.length > 0) fontProcessFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', function() {
    if (fileInput.files.length > 0) fontProcessFile(fileInput.files[0]);
  });
}

function fontProcessFile(file) {
  var statusEl = document.getElementById('fontUploadStatus');
  var ext = file.name.split('.').pop().toLowerCase();
  if (['ttf', 'otf', 'ttc'].indexOf(ext) === -1) {
    statusEl.textContent = 'Unsupported format. Use .ttf, .otf, or .ttc files.';
    return;
  }
  if (file.size > 104857600) {
    statusEl.textContent = 'File too large (max 100MB).';
    return;
  }
  statusEl.textContent = 'Validating font...';
  var reader = new FileReader();
  reader.onload = function(e) {
    var bytes = new Uint8Array(e.target.result.slice(0, 4));
    var magic = '';
    for (var i = 0; i < bytes.length; i++) {
      magic += ('0' + bytes[i].toString(16)).slice(-2);
    }
    if (['00010000', '74727565', '4f54544f', '74746366'].indexOf(magic) === -1) {
      statusEl.textContent = 'Not a valid font file.';
      return;
    }
    fontUpload(file);
  };
  reader.readAsArrayBuffer(file);
}

function fontUpload(file) {
  var statusEl = document.getElementById('fontUploadStatus');
  statusEl.textContent = 'Reading file...';
  var reader = new FileReader();
  reader.onload = function(e) {
    var base64 = e.target.result.split(',')[1];
    statusEl.textContent = 'Uploading ' + escapeHtml(file.name) + '...';
    fetch('/cgi-bin/font_upload.cgi?name=' + encodeURIComponent(file.name), {
      method: 'POST',
      headers: {'Content-Type': 'text/plain'},
      body: base64
    })
      .then(function(r) { return r.text(); })
      .then(function(text) {
        statusEl.textContent = text;
        loadFonts();
      })
      .catch(function(err) { statusEl.textContent = 'Error: ' + err; });
  };
  reader.readAsDataURL(file);
}

/* ===== OPDS Catalog Browser ===== */

var opdsState = {
  sources: [],
  currentUrl: '',
  currentAuth: '',
  breadcrumb: [],
  entries: [],
  loading: false,
  nextUrl: '',
  prevUrl: '',
  feedTitle: ''
};

function loadOpds() {
  setActive('opds');
  setStatus('');
  opdsFetchSources(function() {
    renderOpdsTab();
  });
}

function opdsFetchSources(cb) {
  fetch('/cgi-bin/opds_sources.cgi')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      opdsState.sources = data.sources || [];
      if (cb) cb();
    })
    .catch(function() {
      opdsState.sources = [];
      if (cb) cb();
    });
}

function opdsSaveSources(cb) {
  fetch('/cgi-bin/opds_sources.cgi', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ sources: opdsState.sources })
  })
    .then(function() { if (cb) cb(); })
    .catch(function() { if (cb) cb(); });
}

function opdsAddSource() {
  var nameEl = document.getElementById('opdsNewName');
  var urlEl = document.getElementById('opdsNewUrl');
  var authEl = document.getElementById('opdsNewAuth');
  if (!nameEl || !urlEl) return;
  var name = nameEl.value.trim();
  var url = urlEl.value.trim();
  var auth = authEl ? authEl.value.trim() : '';
  if (!name || !url) { setStatus('Name and URL are required'); return; }
  opdsState.sources.push({ name: name, url: url, auth: auth });
  opdsSaveSources(function() {
    renderOpdsTab();
    setStatus('Source added');
  });
}

function opdsRemoveSource(index) {
  opdsState.sources.splice(index, 1);
  opdsSaveSources(function() {
    renderOpdsTab();
    setStatus('Source removed');
  });
}

function opdsBrowse(url, title, auth) {
  if (!url) return;
  opdsState.loading = true;
  opdsState.currentUrl = url;
  if (typeof auth !== 'undefined') opdsState.currentAuth = auth || '';
  setStatus('Loading feed...');

  if (title) {
    opdsState.breadcrumb.push({ url: url, title: title });
  }

  var proxyUrl = '/cgi-bin/opds_proxy.cgi?url=' + encodeURIComponent(url);
  if (opdsState.currentAuth) {
    proxyUrl += '&auth=' + encodeURIComponent(opdsState.currentAuth);
  }

  fetch(proxyUrl)
    .then(function(r) { return r.text(); })
    .then(function(xmlText) {
      opdsState.loading = false;
      var parsed = opdsParseXml(xmlText);
      opdsState.entries = parsed.entries;
      opdsState.feedTitle = parsed.title;
      opdsState.nextUrl = parsed.nextUrl;
      opdsState.prevUrl = parsed.prevUrl;
      setStatus('');
      opdsRenderBrowse();
    })
    .catch(function(e) {
      opdsState.loading = false;
      setStatus('Error loading feed: ' + e);
    });
}

function opdsParseXml(xmlText) {
  var parser = new DOMParser();
  var doc = parser.parseFromString(xmlText, 'application/xml');
  var ns = 'http://www.w3.org/2005/Atom';

  var result = {
    title: '',
    entries: [],
    nextUrl: '',
    prevUrl: ''
  };

  var parseErr = doc.getElementsByTagName('parsererror');
  if (parseErr.length > 0) return result;

  var feedTitle = doc.getElementsByTagNameNS(ns, 'title');
  if (feedTitle.length > 0) result.title = feedTitle[0].textContent || '';

  var feedLinks = doc.getElementsByTagNameNS(ns, 'feed');
  if (feedLinks.length > 0) {
    var topLinks = feedLinks[0].childNodes;
    for (var li = 0; li < topLinks.length; li++) {
      if (topLinks[li].nodeName === 'link' || (topLinks[li].localName === 'link' && (!topLinks[li].namespaceURI || topLinks[li].namespaceURI === ns))) {
        var rel = topLinks[li].getAttribute('rel') || '';
        var href = topLinks[li].getAttribute('href') || '';
        if (rel === 'next' && href) result.nextUrl = opdsResolveUrl(href);
        if (rel === 'previous' && href) result.prevUrl = opdsResolveUrl(href);
      }
    }
  }

  var entries = doc.getElementsByTagNameNS(ns, 'entry');
  for (var i = 0; i < entries.length; i++) {
    var entry = entries[i];
    var item = {
      title: '',
      author: '',
      summary: '',
      coverUrl: '',
      navLink: '',
      downloads: []
    };

    var titleEl = entry.getElementsByTagNameNS(ns, 'title');
    if (titleEl.length > 0) item.title = titleEl[0].textContent || '';

    var authorEl = entry.getElementsByTagNameNS(ns, 'author');
    if (authorEl.length > 0) {
      var nameEl = authorEl[0].getElementsByTagNameNS(ns, 'name');
      if (nameEl.length > 0) item.author = nameEl[0].textContent || '';
    }

    var summaryEl = entry.getElementsByTagNameNS(ns, 'summary');
    if (summaryEl.length > 0) item.summary = summaryEl[0].textContent || '';
    if (!item.summary) {
      var contentEl = entry.getElementsByTagNameNS(ns, 'content');
      if (contentEl.length > 0) item.summary = contentEl[0].textContent || '';
    }

    var links = entry.getElementsByTagNameNS(ns, 'link');
    for (var j = 0; j < links.length; j++) {
      var lnk = links[j];
      var lRel = lnk.getAttribute('rel') || '';
      var lType = lnk.getAttribute('type') || '';
      var lHref = lnk.getAttribute('href') || '';
      var lTitle = lnk.getAttribute('title') || '';

      if (lRel.indexOf('http://opds-spec.org/image') === 0 || lRel.indexOf('http://opds-spec.org/cover') === 0) {
        if (!item.coverUrl) item.coverUrl = lHref;
      } else if (lRel.indexOf('http://opds-spec.org/image/thumbnail') === 0 || lRel.indexOf('http://opds-spec.org/thumbnail') === 0) {
        item.coverUrl = lHref;
      } else if (lRel.indexOf('http://opds-spec.org/acquisition') === 0) {
        item.downloads.push({
          url: opdsResolveUrl(lHref),
          type: lType,
          title: lTitle || opdsFormatLabel(lType)
        });
      } else if (lType.indexOf('application/atom+xml') === 0) {
        item.navLink = opdsResolveUrl(lHref);
      } else if (lRel === 'alternate' && lType.indexOf('application/atom+xml') === 0) {
        if (!item.navLink) item.navLink = opdsResolveUrl(lHref);
      } else if (lRel === 'subsection') {
        item.navLink = opdsResolveUrl(lHref);
      }
    }

    if (item.coverUrl && item.coverUrl.indexOf('http') !== 0) {
      item.coverUrl = opdsResolveUrl(item.coverUrl);
    }

    result.entries.push(item);
  }

  return result;
}

function opdsResolveUrl(href) {
  if (!href) return '';
  if (href.indexOf('http://') === 0 || href.indexOf('https://') === 0) return href;
  if (!opdsState.currentUrl) return href;
  var base = opdsState.currentUrl;
  if (href.charAt(0) === '/') {
    var m = base.match(/^(https?:\/\/[^\/]+)/);
    return m ? m[1] + href : href;
  }
  return base.replace(/\/[^\/]*$/, '/') + href;
}

function opdsFormatLabel(mimeType) {
  if (!mimeType) return 'Download';
  if (mimeType.indexOf('epub') >= 0) return 'EPUB';
  if (mimeType.indexOf('mobi') >= 0 || mimeType.indexOf('x-mobipocket') >= 0) return 'MOBI';
  if (mimeType.indexOf('pdf') >= 0) return 'PDF';
  if (mimeType.indexOf('x-kindle') >= 0 || mimeType.indexOf('azw') >= 0) return 'AZW3';
  if (mimeType.indexOf('fb2') >= 0) return 'FB2';
  return 'Download';
}

function renderOpdsTab() {
  var html = '<div class="card">'
    + '<div class="card-header"><span class="card-title">OPDS Catalog Browser</span></div>';

  html += '<div style="margin-bottom:12px;">'
    + '<div class="panel-header">Saved Sources</div>';

  if (opdsState.sources.length === 0) {
    html += '<div class="empty-state">No OPDS sources saved. Add one below.</div>';
  } else {
    html += '<div style="border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:8px;">';
    for (var i = 0; i < opdsState.sources.length; i++) {
      var s = opdsState.sources[i];
      html += '<div class="opds-source-row">'
        + '<span class="opds-source-name">' + escapeHtml(s.name) + '</span>'
        + '<span class="opds-source-url">' + escapeHtml(s.url) + '</span>'
        + '<button class="btn btn-primary" style="font-size:12px;padding:4px 10px;" onclick="opdsState.breadcrumb=[]; opdsBrowse(\'' + escapeHtml(s.url.replace(/'/g, "\\'")) + '\', \'' + escapeHtml(s.name.replace(/'/g, "\\'")) + '\', \'' + escapeHtml((s.auth || '').replace(/'/g, "\\'")) + '\')">Browse</button>'
        + '<button class="btn" style="font-size:12px;padding:4px 10px;color:var(--danger);" onclick="opdsRemoveSource(' + i + ')">Remove</button>'
        + '</div>';
    }
    html += '</div>';
  }

  html += '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">'
    + '<input type="text" id="opdsNewName" class="input-field input-small" style="margin-bottom:0;flex:1;min-width:100px;" placeholder="Source name">'
    + '<input type="text" id="opdsNewUrl" class="input-field input-small" style="margin-bottom:0;flex:2;min-width:150px;" placeholder="http://server:port/opds">'
    + '<input type="text" id="opdsNewAuth" class="input-field input-small" style="margin-bottom:0;flex:1;min-width:80px;" placeholder="user:pass (optional)">'
    + '<button class="btn btn-primary" onclick="opdsAddSource()">Add Source</button>'
    + '</div></div>';

  html += '<div style="margin-bottom:12px;">'
    + '<div class="panel-header">Browse by URL</div>'
    + '<div style="display:flex;gap:8px;align-items:center;">'
    + '<input type="text" id="opdsDirectUrl" class="input-field input-small" style="margin-bottom:0;flex:1;" placeholder="http://server:port/opds">'
    + '<input type="text" id="opdsDirectAuth" class="input-field input-small" style="margin-bottom:0;width:120px;" placeholder="user:pass">'
    + '<button class="btn btn-primary" onclick="opdsState.breadcrumb=[]; opdsBrowse(document.getElementById(\'opdsDirectUrl\').value.trim(), \'Feed\', document.getElementById(\'opdsDirectAuth\').value.trim())">Browse</button>'
    + '</div></div>';

  html += '<div id="opdsBrowseArea"></div></div>';
  document.getElementById('content').innerHTML = html;
}

function opdsRenderBrowse() {
  var area = document.getElementById('opdsBrowseArea');
  if (!area) return;

  var html = '';

  if (opdsState.breadcrumb.length > 0) {
    html += '<div class="opds-breadcrumb">';
    for (var bi = 0; bi < opdsState.breadcrumb.length; bi++) {
      if (bi > 0) html += '<span class="sep">&rsaquo;</span>';
      if (bi < opdsState.breadcrumb.length - 1) {
        html += '<a onclick="opdsBreadcrumbNav(' + bi + ')">' + escapeHtml(opdsState.breadcrumb[bi].title) + '</a>';
      } else {
        html += '<span>' + escapeHtml(opdsState.breadcrumb[bi].title) + '</span>';
      }
    }
    html += '</div>';
  }

  if (opdsState.feedTitle) {
    html += '<div style="font-size:15px;font-weight:500;margin-bottom:10px;">' + escapeHtml(opdsState.feedTitle) + '</div>';
  }

  if (opdsState.entries.length === 0) {
    html += '<div class="empty-state">No entries found in this feed.</div>';
  } else {
    html += opdsRenderEntries(opdsState.entries);
  }

  if (opdsState.prevUrl || opdsState.nextUrl) {
    html += '<div class="opds-pagination"><div class="opds-pagination-btns">';
    if (opdsState.prevUrl) {
      html += '<button class="btn" style="font-size:12px;padding:4px 10px;" onclick="opdsBrowse(\'' + escapeHtml(opdsState.prevUrl.replace(/'/g, "\\'")) + '\', null)">Previous</button>';
    }
    if (opdsState.nextUrl) {
      html += '<button class="btn" style="font-size:12px;padding:4px 10px;" onclick="opdsBrowse(\'' + escapeHtml(opdsState.nextUrl.replace(/'/g, "\\'")) + '\', null)">Next</button>';
    }
    html += '</div></div>';
  }

  area.innerHTML = html;
}

function opdsRenderEntries(entries) {
  var html = '<div style="border:1px solid var(--border);border-radius:6px;overflow:hidden;">';
  for (var i = 0; i < entries.length; i++) {
    var e = entries[i];
    if (e.navLink && e.downloads.length === 0) {
      html += '<div class="opds-entry opds-entry-nav" onclick="opdsBrowse(\'' + escapeHtml(e.navLink.replace(/'/g, "\\'")) + '\', \'' + escapeHtml(e.title.replace(/'/g, "\\'")) + '\')">'
        + '<div class="opds-entry-icon">&#x1F4C1;</div>'
        + '<div class="opds-entry-info">'
        + '<div class="opds-entry-title">' + escapeHtml(e.title) + '</div>'
        + (e.summary ? '<div class="opds-entry-summary">' + escapeHtml(e.summary) + '</div>' : '')
        + '</div></div>';
    } else {
      var coverHtml = '';
      if (e.coverUrl) {
        var proxiedCover = '/cgi-bin/opds_proxy.cgi?url=' + encodeURIComponent(e.coverUrl);
        if (opdsState.currentAuth) proxiedCover += '&auth=' + encodeURIComponent(opdsState.currentAuth);
        coverHtml = '<img class="opds-entry-thumb" src="' + proxiedCover + '" onerror="this.style.visibility=\'hidden\'">';
      } else {
        coverHtml = '<div class="opds-entry-thumb" style="display:flex;align-items:center;justify-content:center;font-size:20px;">&#x1F4D6;</div>';
      }

      html += '<div class="opds-entry">'
        + coverHtml
        + '<div class="opds-entry-info">'
        + '<div class="opds-entry-title">' + escapeHtml(e.title) + '</div>'
        + '<div class="opds-entry-meta">' + (e.author ? escapeHtml(e.author) : '') + '</div>'
        + (e.summary ? '<div class="opds-entry-summary">' + escapeHtml(e.summary) + '</div>' : '')
        + '</div>'
        + '<div class="opds-entry-actions">';

      if (e.navLink) {
        html += '<button class="btn" style="font-size:12px;padding:4px 10px;" onclick="event.stopPropagation(); opdsBrowse(\'' + escapeHtml(e.navLink.replace(/'/g, "\\'")) + '\', \'' + escapeHtml(e.title.replace(/'/g, "\\'")) + '\')">Details</button>';
      }

      for (var d = 0; d < e.downloads.length; d++) {
        var dl = e.downloads[d];
        var dlFilename = (e.title || 'book').replace(/[\/\\:*?"<>|]/g, '_');
        if (e.author) dlFilename += ' - ' + e.author.replace(/[\/\\:*?"<>|]/g, '_');
        var ext = opdsFormatLabel(dl.type).toLowerCase();
        if (ext === 'download') ext = 'epub';
        dlFilename += '.' + ext;
        html += '<button class="btn btn-primary" style="font-size:12px;padding:4px 10px;" onclick="event.stopPropagation(); opdsDownload(\'' + escapeHtml(dl.url.replace(/'/g, "\\'")) + '\', \'' + escapeHtml(dlFilename.replace(/'/g, "\\'")) + '\')">'
          + '<span class="opds-format-badge">' + escapeHtml(opdsFormatLabel(dl.type)) + '</span></button>';
      }

      html += '</div></div>';
    }
  }
  html += '</div>';
  return html;
}

function opdsDownload(url, filename) {
  setStatus('Downloading: ' + filename + '...');
  fetch('/cgi-bin/opds_download.cgi', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: 'url=' + encodeURIComponent(url)
      + '&filename=' + encodeURIComponent(filename)
      + '&auth=' + encodeURIComponent(opdsState.currentAuth)
  })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.status === 'ok') {
        setStatus('Downloaded: ' + data.filename);
      } else {
        setStatus('Failed: ' + (data.message || 'unknown error'));
      }
    })
    .catch(function(e) { setStatus('Error: ' + e); });
}

function opdsBreadcrumbNav(index) {
  opdsState.breadcrumb = opdsState.breadcrumb.slice(0, index + 1);
  var target = opdsState.breadcrumb[index];
  opdsState.breadcrumb.pop();
  opdsBrowse(target.url, target.title);
}

var TABS = [
  { id: 'series', label: 'My Series', load: loadSeries },
  { id: 'create', label: 'Create Series', load: loadCreate },
  { id: 'progress', label: 'Sync Services', load: loadSyncServices },
  { id: 'stats', label: 'Stats', load: loadStats },
  { id: 'screensavers', label: 'Screensavers', load: loadScreensavers },
  { id: 'collections', label: 'Collections', load: loadCollections },
  { id: 'fonts', label: 'Fonts', load: loadFonts },
  { id: 'upload', label: 'Upload Books', load: loadUpload },
  { id: 'opds', label: 'OPDS', load: loadOpds },
  { id: 'calibre', label: 'Calibre', load: loadCalibre }
];

function initNav() {
  var nav = document.getElementById('navBar');
  nav.innerHTML = '';
  for (var i = 0; i < TABS.length; i++) {
    var btn = document.createElement('button');
    btn.id = 'btn_' + TABS[i].id;
    btn.textContent = TABS[i].label;
    btn.setAttribute('role', 'tab');
    btn.setAttribute('aria-label', TABS[i].label);
    (function(loadFn) {
      btn.addEventListener('click', loadFn);
    })(TABS[i].load);
    nav.appendChild(btn);
  }
}

initNav();
loadSeries();
</script>
