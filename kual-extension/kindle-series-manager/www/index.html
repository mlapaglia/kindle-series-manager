<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kindle Series Manager</title>
<style>
* { box-sizing: border-box; }
:root {
  --bg: #f8f8f8;
  --fg: #1a1a1a;
  --fg-muted: #666;
  --fg-faint: #888;
  --fg-fainter: #aaa;
  --surface: #fff;
  --surface-alt: #fafafa;
  --border: #e0e0e0;
  --border-light: #e8e8e8;
  --border-row: #f0f0f0;
  --accent: #1a1a1a;
  --accent-hover: #333;
  --input-border: #d0d0d0;
  --input-border-hover: #bbb;
  --badge-bg: #f0f0f0;
  --danger: #c0392b;
  --danger-border: #e0c0bc;
  --danger-bg: #fdf2f0;
}
.dark {
  --bg: #1a1a1a;
  --fg: #e0e0e0;
  --fg-muted: #999;
  --fg-faint: #888;
  --fg-fainter: #666;
  --surface: #252525;
  --surface-alt: #2a2a2a;
  --border: #3a3a3a;
  --border-light: #333;
  --border-row: #303030;
  --accent: #e0e0e0;
  --accent-hover: #fff;
  --input-border: #444;
  --input-border-hover: #666;
  --badge-bg: #333;
  --danger: #e74c3c;
  --danger-border: #5a2a2a;
  --danger-bg: #3a2020;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--fg);
  margin: 0;
  padding: 0;
  font-size: 15px;
  line-height: 1.5;
}

.header {
  background: #1a1a1a;
  color: #fff;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.dark .header { background: #111; }
.header h1 {
  font-size: 18px;
  font-weight: 600;
  margin: 0;
  letter-spacing: -0.3px;
  flex: 1;
}
.header .logo {
  font-size: 22px;
  opacity: 0.7;
}
.theme-toggle {
  width: 44px;
  height: 24px;
  border-radius: 12px;
  background: #444;
  border: none;
  cursor: pointer;
  position: relative;
  padding: 0;
  transition: background 0.25s;
  flex-shrink: 0;
}
.theme-toggle::after {
  content: '';
  position: absolute;
  top: 3px;
  left: 3px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #fff;
  transition: transform 0.25s;
}
.dark .theme-toggle { background: #666; }
.dark .theme-toggle::after { transform: translateX(20px); }

.nav {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 12px;
}
.nav button {
  font-size: 14px;
  font-weight: 500;
  padding: 12px 16px;
  border: none;
  background: none;
  color: var(--fg-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
}
.nav button:hover { color: var(--fg); }
.nav button.active {
  color: var(--fg);
  border-bottom-color: var(--accent);
}

.container { max-width: 960px; margin: 0 auto; padding: 16px; }

#status {
  padding: 10px 14px;
  margin: 0 0 12px 0;
  font-size: 14px;
  color: var(--fg-muted);
  background: var(--surface);
  border-radius: 6px;
  border: 1px solid var(--border-light);
  display: none;
}
#status.visible { display: block; }

.card {
  background: var(--surface);
  border-radius: 8px;
  border: 1px solid var(--border);
  padding: 16px;
  margin-bottom: 12px;
}
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.card-title {
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.2px;
}
.card-subtitle {
  font-size: 13px;
  color: var(--fg-faint);
  font-weight: 400;
}

.book-item {
  padding: 6px 0;
  font-size: 14px;
  color: var(--fg-muted);
  border-bottom: 1px solid var(--border-row);
}
.book-item:last-child { border-bottom: none; }
.book-num {
  display: inline-block;
  width: 24px;
  height: 24px;
  line-height: 24px;
  text-align: center;
  background: var(--badge-bg);
  border-radius: 4px;
  font-size: 12px;
  font-weight: 600;
  color: var(--fg-muted);
  margin-right: 8px;
}

.btn {
  font-size: 14px;
  font-weight: 500;
  padding: 8px 16px;
  border: 1px solid var(--input-border);
  border-radius: 6px;
  background: var(--surface);
  color: var(--fg);
  cursor: pointer;
  transition: all 0.15s;
}
.btn:hover { background: var(--surface-alt); border-color: var(--input-border-hover); }
.btn:active { background: var(--badge-bg); }
.btn-primary {
  background: var(--accent);
  color: var(--bg);
  border-color: var(--accent);
}
.btn-primary:hover { background: var(--accent-hover); }
.btn-danger {
  color: var(--danger);
  border-color: var(--danger-border);
}
.btn-danger:hover { background: var(--danger-bg); border-color: var(--danger); }

.empty-state {
  text-align: center;
  padding: 32px 16px;
  color: var(--fg-fainter);
  font-size: 14px;
}

/* Create series panels */
.create-layout { display: flex; gap: 16px; }
.create-layout > div { flex: 1; min-width: 0; }

.panel-header {
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--fg-faint);
  margin-bottom: 8px;
}

.input-field {
  width: 100%;
  font-size: 15px;
  padding: 10px 12px;
  border: 1px solid var(--input-border);
  border-radius: 6px;
  margin-bottom: 12px;
  transition: border-color 0.15s;
  font-family: inherit;
  background: var(--surface);
  color: var(--fg);
}
.input-field:focus { outline: none; border-color: var(--accent); }
.input-field::placeholder { color: var(--fg-fainter); }
.input-small { font-size: 13px; padding: 8px 10px; margin-bottom: 8px; }

.selected-list {
  min-height: 80px;
  border: 2px dashed var(--input-border);
  border-radius: 8px;
  padding: 6px;
  background: var(--surface-alt);
  transition: border-color 0.15s;
}
.selected-list.has-items { border-style: solid; border-color: var(--border); background: var(--surface); }

.selected-book {
  display: flex;
  align-items: center;
  padding: 10px;
  margin: 4px 0;
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: 6px;
  cursor: grab;
  user-select: none;
  transition: box-shadow 0.15s, opacity 0.15s;
}
.selected-book:hover { box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.selected-book:active { cursor: grabbing; }
.selected-book .grip {
  color: var(--fg-fainter);
  margin-right: 8px;
  font-size: 16px;
  line-height: 1;
}
.selected-book .pos {
  font-weight: 700;
  font-size: 14px;
  width: 26px;
  height: 26px;
  line-height: 26px;
  text-align: center;
  margin-right: 10px;
  background: var(--accent);
  color: var(--bg);
  border-radius: 50%;
  flex-shrink: 0;
}
.selected-book .title { flex: 1; font-size: 14px; }
.selected-book .remove-btn {
  cursor: pointer;
  color: var(--fg-fainter);
  font-size: 18px;
  padding: 0 4px;
  line-height: 1;
  transition: color 0.15s;
}
.selected-book .remove-btn:hover { color: var(--danger); }
.selected-book.dragging { opacity: 0.3; }
.selected-book.drag-over { border-top: 2px solid var(--accent); margin-top: 2px; }

.avail-list {
  max-height: 420px;
  overflow-y: auto;
  border: 1px solid var(--border);
  border-radius: 6px;
}
.avail-book {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border-row);
  cursor: pointer;
  font-size: 14px;
  transition: background 0.1s;
}
.avail-book:last-child { border-bottom: none; }
.avail-book:hover { background: var(--surface-alt); }
.avail-book.added {
  opacity: 0.3;
  pointer-events: none;
  text-decoration: line-through;
}
</style>
</head>
<body>

<div class="header">
  <span class="logo">&#x1F4DA;</span>
  <h1>Kindle Series Manager</h1>
  <button class="theme-toggle" onclick="toggleDark()" title="Toggle dark mode"></button>
</div>

<div class="nav">
  <button id="btnList" onclick="loadSeries()">My Series</button>
  <button id="btnCreate" onclick="loadCreate()">Create Series</button>
  <button id="btnProgress" onclick="loadProgress()">Progress Tracking</button>
</div>

<div class="container">
  <div id="status"></div>
  <div id="content"></div>
</div>

<script>
if (localStorage.getItem('dark') !== '0') document.documentElement.classList.add('dark');
function toggleDark() {
  var on = document.documentElement.classList.toggle('dark');
  localStorage.setItem('dark', on ? '1' : '0');
}

var selectedBooks = [];
var editingSeriesId = null;

function setStatus(msg) {
  var el = document.getElementById('status');
  if (msg) {
    el.textContent = msg;
    el.classList.add('visible');
  } else {
    el.textContent = '';
    el.classList.remove('visible');
  }
}

function setActive(id) {
  var btns = document.querySelectorAll('.nav button');
  for (var i = 0; i < btns.length; i++) btns[i].className = '';
  if (id) document.getElementById(id).className = 'active';
}

function loadSeries() {
  setActive('btnList');
  setStatus('Loading...');
  fetch('/cgi-bin/series.cgi')
    .then(function(r) { return r.text(); })
    .then(function(text) {
      document.getElementById('content').innerHTML = text;
      setStatus('');
    })
    .catch(function(e) { setStatus('Error: ' + e); });
}

function loadCreate() {
  setActive('btnCreate');
  setStatus('Loading books...');
  selectedBooks = [];
  editingSeriesId = null;
  fetch('/cgi-bin/books.cgi')
    .then(function(r) { return r.text(); })
    .then(function(text) {
      document.getElementById('content').innerHTML = text;
      setStatus('');
    })
    .catch(function(e) { setStatus('Error: ' + e); });
}

function editSeries(seriesId) {
  setActive('btnCreate');
  setStatus('Loading...');
  selectedBooks = [];
  editingSeriesId = seriesId;

  Promise.all([
    fetch('/cgi-bin/seriesdata.cgi?id=' + encodeURIComponent(seriesId)).then(function(r) { return r.json(); }),
    fetch('/cgi-bin/books.cgi').then(function(r) { return r.text(); })
  ]).then(function(results) {
    var data = results[0];
    var html = results[1];

    document.getElementById('content').innerHTML = html;
    document.getElementById('newSeriesName').value = data.name;
    document.getElementById('newSeriesAsin').value = data.asin || '';

    selectedBooks = data.books;
    renderSelected();

    var avail = document.querySelectorAll('.avail-book');
    for (var i = 0; i < avail.length; i++) {
      var key = avail[i].getAttribute('data-key');
      if (selectedBooks.some(function(b) { return b.key === key; })) {
        avail[i].classList.add('added');
      }
    }

    var badgeVal = data.badgeMode || 'none';
    var badgeRadio = document.querySelector('input[name="badgeMode"][value="' + badgeVal + '"]');
    if (badgeRadio) badgeRadio.checked = true;

    document.getElementById('btnSave').textContent = 'Update Series';
    setStatus('');
  }).catch(function(e) { setStatus('Error: ' + e); });
}

function addBook(el) {
  var key = el.getAttribute('data-key');
  var title = el.getAttribute('data-title');
  if (selectedBooks.some(function(b) { return b.key === key; })) return;
  selectedBooks.push({ key: key, title: title });
  el.classList.add('added');
  renderSelected();
}

function removeBook(index) {
  var removed = selectedBooks.splice(index, 1)[0];
  var avail = document.querySelectorAll('.avail-book');
  for (var i = 0; i < avail.length; i++) {
    if (avail[i].getAttribute('data-key') === removed.key) {
      avail[i].classList.remove('added');
    }
  }
  renderSelected();
}

function renderSelected() {
  var container = document.getElementById('selectedBooks');
  var countEl = document.getElementById('selectedCount');
  countEl.textContent = selectedBooks.length;

  if (selectedBooks.length === 0) {
    container.className = 'selected-list';
    container.innerHTML = '<div class="empty-state">Click books from the right to add them</div>';
  } else {
    container.className = 'selected-list has-items';
    var html = '';
    for (var i = 0; i < selectedBooks.length; i++) {
      html += '<div class="selected-book" draggable="true" data-idx="' + i + '">'
        + '<span class="grip">&#x2630;</span>'
        + '<span class="pos">' + (i + 1) + '</span>'
        + '<span class="title">' + selectedBooks[i].title + '</span>'
        + '<span class="remove-btn" onclick="removeBook(' + i + ')">&times;</span>'
        + '</div>';
    }
    container.innerHTML = html;
  }
  setupDrag();
}

var dragSrcIdx = null;

function setupDrag() {
  var items = document.querySelectorAll('.selected-book');
  for (var i = 0; i < items.length; i++) {
    items[i].addEventListener('dragstart', function(e) {
      dragSrcIdx = parseInt(this.getAttribute('data-idx'));
      this.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', dragSrcIdx);
    });
    items[i].addEventListener('dragend', function(e) {
      this.classList.remove('dragging');
      var all = document.querySelectorAll('.selected-book');
      for (var j = 0; j < all.length; j++) all[j].classList.remove('drag-over');
    });
    items[i].addEventListener('dragover', function(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      var all = document.querySelectorAll('.selected-book');
      for (var j = 0; j < all.length; j++) all[j].classList.remove('drag-over');
      this.classList.add('drag-over');
    });
    items[i].addEventListener('drop', function(e) {
      e.preventDefault();
      var targetIdx = parseInt(this.getAttribute('data-idx'));
      if (dragSrcIdx === null || dragSrcIdx === targetIdx) return;
      var moved = selectedBooks.splice(dragSrcIdx, 1)[0];
      selectedBooks.splice(targetIdx, 0, moved);
      renderSelected();
    });
  }
}

function filterBooks() {
  var q = document.getElementById('bookFilter').value.toLowerCase();
  var items = document.querySelectorAll('.avail-book');
  for (var i = 0; i < items.length; i++) {
    var title = items[i].getAttribute('data-title').toLowerCase();
    items[i].style.display = title.indexOf(q) >= 0 ? '' : 'none';
  }
}

function saveSeries() {
  var name = document.getElementById('newSeriesName').value.trim();
  if (!name) { setStatus('Enter a series name'); return; }
  if (selectedBooks.length < 2) { setStatus('Select at least 2 books'); return; }

  var asin = document.getElementById('newSeriesAsin').value.trim();
  var books = [];
  for (var i = 0; i < selectedBooks.length; i++) {
    books.push(selectedBooks[i].key + ':' + (i + 1));
  }

  var badgeMode = 'none';
  var badgeRadios = document.getElementsByName('badgeMode');
  for (var j = 0; j < badgeRadios.length; j++) {
    if (badgeRadios[j].checked) { badgeMode = badgeRadios[j].value; break; }
  }

  var isEdit = !!editingSeriesId;
  setStatus(isEdit ? 'Updating series...' : 'Creating series...');
  var body = 'name=' + encodeURIComponent(name)
    + '&asin=' + encodeURIComponent(asin)
    + '&badge_mode=' + encodeURIComponent(badgeMode)
    + '&books=' + encodeURIComponent(books.join(','));

  if (isEdit) {
    body += '&edit_id=' + encodeURIComponent(editingSeriesId);
  }

  fetch('/cgi-bin/create.cgi', {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: body
  })
    .then(function(r) { return r.text(); })
    .then(function(text) {
      editingSeriesId = null;
      setStatus(text);
      loadSeries();
    })
    .catch(function(e) { setStatus('Error: ' + e); });
}

function removeSeries(seriesId) {
  if (!confirm('Remove this series? Books will return to the library.')) return;
  setStatus('Removing...');
  fetch('/cgi-bin/remove.cgi?id=' + encodeURIComponent(seriesId))
    .then(function(r) { return r.text(); })
    .then(function(text) {
      setStatus(text);
      loadSeries();
    })
    .catch(function(e) { setStatus('Error: ' + e); });
}

function loadProgress() {
  setActive('btnProgress');
  setStatus('Loading...');
  fetch('/cgi-bin/grpage.cgi')
    .then(function(r) { return r.text(); })
    .then(function(text) {
      document.getElementById('content').innerHTML = text;
      setStatus('');
    })
    .catch(function(e) { setStatus('Error: ' + e); });
}

function grSaveCreds() {
  var email = document.getElementById('grEmail').value.trim();
  var password = document.getElementById('grPassword').value;
  var userId = document.getElementById('grUserId').value.trim();
  var statusEl = document.getElementById('credsStatus');

  if (!email || !password || !userId) {
    statusEl.textContent = 'All fields are required';
    return;
  }

  statusEl.textContent = 'Saving...';
  fetch('/cgi-bin/gr_savecreds.cgi', {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: 'email=' + encodeURIComponent(email)
      + '&password=' + encodeURIComponent(password)
      + '&user_id=' + encodeURIComponent(userId)
  })
    .then(function(r) { return r.text(); })
    .then(function(text) { statusEl.textContent = text; })
    .catch(function(e) { statusEl.textContent = 'Error: ' + e; });
}

function grLogin() {
  var el = document.getElementById('loginOutput');
  el.style.display = 'block';
  el.textContent = 'Signing in...';

  fetch('/cgi-bin/gr_dologin.cgi', {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: ''
  })
    .then(function(r) { return r.text(); })
    .then(function(text) {
      el.textContent = text;
      grRefreshStatus();
    })
    .catch(function(e) { el.textContent = 'Error: ' + e; });
}

function grBuildMapping() {
  var el = document.getElementById('mappingOutput');
  el.style.display = 'block';
  el.textContent = 'Building mapping...';

  fetch('/cgi-bin/gr_domapping.cgi', {
    method: 'POST',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: ''
  })
    .then(function(r) { return r.text(); })
    .then(function(text) {
      el.textContent = text;
      loadProgress();
    })
    .catch(function(e) { el.textContent = 'Error: ' + e; });
}

function grRefreshStatus() {
  fetch('/cgi-bin/gr_status.cgi')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var logEl = document.getElementById('syncLog');
      if (logEl && data.last_log) {
        logEl.textContent = data.last_log;
      }
    })
    .catch(function(e) { setStatus('Error refreshing status: ' + e); });
}

loadSeries();
</script>
</body>
</html>
