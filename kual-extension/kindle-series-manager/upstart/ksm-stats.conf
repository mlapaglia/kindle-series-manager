description "KSM reading statistics daemon"

stop on stopping system

export LANG=en_US.UTF-8

script
    LOG="/mnt/us/ksm-stats-upstart.log"
    EXT_DIR="/mnt/us/extensions/kindle-series-manager"
    DAEMON_SCRIPT="$EXT_DIR/bin/ksm_stats_daemon.sh"

    echo "$(date) ksm-stats starting" >> "$LOG"

    if [ ! -f "$DAEMON_SCRIPT" ]; then
        echo "$(date) DAEMON_SCRIPT missing, exiting" >> "$LOG"
        exit 1
    fi

    echo "$(date) launching ksm_stats_daemon.sh" >> "$LOG"
    exec sh "$DAEMON_SCRIPT" >> "$LOG" 2>&1
end script
