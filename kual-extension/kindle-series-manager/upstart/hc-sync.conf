description "Hardcover progress sync daemon"

stop on stopping system

export LANG=en_US.UTF-8

script
    LOG="/mnt/us/hc-upstart.log"
    EXT_DIR="/mnt/us/extensions/kindle-series-manager"
    FLAG_FILE="/mnt/us/ENABLE_HC_SYNC"
    SYNC_SCRIPT="$EXT_DIR/hardcover/hc_sync.sh"

    echo "$(date) hc-sync starting" >> "$LOG"

    if [ ! -f "$FLAG_FILE" ]; then
        echo "$(date) FLAG_FILE missing, exiting" >> "$LOG"
        exit 0
    fi

    if [ ! -f "$SYNC_SCRIPT" ]; then
        echo "$(date) SYNC_SCRIPT missing, exiting" >> "$LOG"
        exit 0
    fi

    echo "$(date) launching hc_sync.sh" >> "$LOG"
    exec sh "$SYNC_SCRIPT" >> "$LOG" 2>&1
end script
